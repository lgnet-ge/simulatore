// Funzioni di utilità
function calcolaSottofascia(attivi) {
  const n = attivi.length;
  if (n >= 9) return 3;
  if (n >= 3) return 2;
  return 1;
}

function canoneConFascia(zd, mq, sottofascia, maggArredo, maggDurata) {
  const ampiezza = zd.max - zd.min;
  const terzo = ampiezza / 3;
  const sfMin = zd.min + (sottofascia - 1) * terzo;
  const sfMax = zd.min + sottofascia * terzo;
  const base = sfMax * mq;
  const percArredo = maggArredo === "completo" ? 0.12 : maggArredo === "parziale" ? 0.06 : 0;
  const percDurata = maggDurata === "4" ? 0.02 : maggDurata === "5" ? 0.04 : maggDurata === "6" ? 0.06 : 0;
  const totPerc = percArredo + percDurata;
  return { sfMin: sfMin * mq, sfMax: sfMax * mq, canoneMin: sfMin * mq * (1 + totPerc), canoneMax: base * (1 + totPerc), percArredo, percDurata, totPerc };
}

function omiSuggerimenti(zona, mq, stato) {
  const ov = window.OMI_VALORI?.[zona];
  if (!ov || !mq) return null;
  let aqUnit, lcUnit;
  if (stato === "ottimo") { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.5; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.5; }
  else if (stato === "normale") { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.25; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.25; }
  else { aqUnit = ov.aq_min; lcUnit = ov.lc_min; }
  return { vi: Math.round(aqUnit * mq), cm: Math.round(lcUnit * mq / 12), aqUnit: Math.round(aqUnit), lcUnit: lcUnit.toFixed(1) };
}

async function geocode(address) {
  const q = encodeURIComponent(address + ", Genova, Liguria, Italia");
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=it&addressdetails=1&accept-language=it`;
  const res = await fetch(url, { headers: { "Accept-Language": "it", "User-Agent": "ComparatoreLocazioneGenova/1.0" } });
  if (!res.ok) throw new Error("Errore geocoding");
  const data = await res.json();
  if (!data.length) throw new Error("Indirizzo non trovato");
  return data[0];
}

const IMU_ORD = 0.0106, IMU_MOLT = 160, IMU_RIVAL = 1.05, IMU_RID_CONC = 0.25;
const CED_LIB = 0.21, CED_CONC = 0.10, ARTE_SCONTO = 0.25, IRPEF_DED = 0.05, TEFA = 0.03;
const TARI_TAB = [[0.927, 89.68]];
function calcolaTari(mq) { const [f, v] = TARI_TAB[0]; return (f * mq + v) * (1 + TEFA); }

function fEur(v, sign = false) {
  const f = new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(Math.abs(v || 0));
  if (sign) return (v >= 0 ? "+" : "-") + " " + f;
  return (v < 0 ? "-" : "") + f;
}

function calcola({ rendita, valoreImmobile, mq, zona, canoneAnnuo, canoneConc, condoMese, manuAnno }) {
  const renditaStimata = rendita <= 0;
  const renditaEff = rendita > 0 ? rendita : valoreImmobile / (IMU_RIVAL * IMU_MOLT);
  const imuOrd = renditaEff * IMU_RIVAL * IMU_MOLT * IMU_ORD;
  const imuConc = imuOrd * (1 - IMU_RID_CONC);
  const man = manuAnno > 0 ? manuAnno : (valoreImmobile > 0 ? valoreImmobile * 0.005 : mq * 3);
  const condo = condoMese > 0 ? condoMese * 12 : 600;
  const ass = 250, tariSfitta = calcolaTari(mq);
  const costiBase = ass + condo + man;
  const zd = ZT[zona] || { min: 0, max: 0 };
  const cConc = canoneConc || (zd.max * mq);
  const canoneERS = zd.max * mq * (1 - ARTE_SCONTO);
  
  const sfittaCed = n => -(imuOrd * 1.1 + tariSfitta + costiBase) * n;
  const concCed = n => { const c = cConc, ced = c * CED_CONC; return { netto: (c - ced - imuConc - costiBase) * n, c, ced }; };
  const libCed = n => { const c = canoneAnnuo, ced = c * CED_LIB; return { netto: (c - ced - imuOrd - costiBase) * n, c, ced }; };
  const ersCed = n => { const c = canoneERS, ced = c * CED_CONC; return { netto: (c - ced - imuConc - costiBase) * n, c, ced }; };
  
  const irpefN = (canone, aliq, imu, n) => { const base = canone * (1 - IRPEF_DED); return (canone - base * aliq - imu - costiBase) * n; };
  const concIrpef = IRPEF_SCAGLIONI.map(({ aliq }) => ({ n1: irpefN(cConc, aliq, imuOrd, 1), n3: irpefN(cConc, aliq, imuOrd, 3), n5: irpefN(cConc, aliq, imuOrd, 5) }));
  const libIrpef = IRPEF_SCAGLIONI.map(({ aliq }) => ({ n1: irpefN(canoneAnnuo, aliq, imuOrd, 1), n3: irpefN(canoneAnnuo, aliq, imuOrd, 3), n5: irpefN(canoneAnnuo, aliq, imuOrd, 5) }));
  const ersIrpef = IRPEF_SCAGLIONI.map(({ aliq }) => ({ n1: irpefN(canoneERS, aliq, imuOrd, 1), n3: irpefN(canoneERS, aliq, imuOrd, 3), n5: irpefN(canoneERS, aliq, imuOrd, 5) }));
  
  return {
    sfitta: { 1: sfittaCed(1), 3: sfittaCed(3), 5: sfittaCed(5) },
    conc: { 1: concCed(1), 3: concCed(3), 5: concCed(5), cUsato: cConc },
    lib: { 1: libCed(1), 3: libCed(3), 5: libCed(5) },
    ers: { 1: ersCed(1), 3: ersCed(3), 5: ersCed(5), cMese: canoneERS / 12 },
    concIrpef, libIrpef, ersIrpef,
    imuOrd, imuConc, costiBase, cConc, canoneAnnuo, canoneERS, tariSfitta, renditaEff, renditaStimata,
  };
}

function App() {

  const [addr, setAddr] = useState("");

  const [mq, setMq] = useState("");
  const [stato, setStato] = useState("normale");
  const [form, setForm] = useState({ r: "", vi: "", cm: "", co: "", mn: "" });
  const [attivi, setAttivi] = useState([2, 4]);
  const [maggArredo, setMaggArredo] = useState("no");
  const [maggDurata, setMaggDurata] = useState("3");
  const [ris, setRis] = useState(null);
  const [fiscalTab, setFiscalTab] = useState("ced");
  const [irpefScag, setIrpefScag] = useState(0);
  const [periodo, setPeriodo] = useState(5);
  const [mostraAltri, setMostraAltri] = useState(false);
  const [mostraAnalisi, setMostraAnalisi] = useState(false);
  const [s2err, setS2err] = useState("");
  const [s3err, setS3err] = useState("");

  const sottofascia = useMemo(() => calcolaSottofascia(attivi), [attivi]);
  const fasciaCalc = useMemo(() => {
    const zd = zona ? ZT[zona] : null;
    const m = parseFloat(mq);
    if (!zd || isNaN(m) || m <= 0) return null;
    return canoneConFascia(zd, m, sottofascia, maggArredo, maggDurata);
  }, [zona, mq, sottofascia, maggArredo, maggDurata]);
  const omiSug = useMemo(() => omiSuggerimenti(zona, parseFloat(mq), stato), [zona, mq, stato]);

  const fa = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const cerca = async () => {
    if (!addr.trim()) return;
    setLoading(true);
    setGeoErr("");
    setGeoResult(null);
    setZona(null);
    try {
      const res = await geocode(addr);
      setGeoResult(res);
      const lon = parseFloat(res.lon), lat = parseFloat(res.lat);
      // Usa la funzione globale di data.js
      const hit = await window.trovaZonaGeoAsync(lon, lat);
      setZona(hit ? hit.zona : null);
    } catch (e) {
      setGeoErr(e.message || "Indirizzo non trovato.");
    } finally {
      setLoading(false);
    }
  };

  const vaiStep2 = () => { if (zona) setStep(2); };
  const vaiStep3 = () => {
    setS2err("");
    if (!parseFloat(mq) || parseFloat(mq) <= 0) { setS2err("Inserisci la superficie in mq."); return; }
    if (omiSug) { fa("vi", omiSug.vi); fa("cm", omiSug.cm); }
    setStep(3);
  };
  const vaiStep4 = () => {
    setS3err("");
    const r = parseFloat(form.r) || 0, vi = parseFloat(form.vi) || 0, cm = parseFloat(form.cm);
    if (r <= 0 && vi <= 0) { setS3err("Inserisci almeno la rendita catastale oppure il valore di mercato."); return; }
    if (!cm || cm <= 0) { setS3err("Inserisci il canone mensile desiderato."); return; }
    setStep(4);
  };
  const vaiStep5 = () => setStep(5);
  const calcRes = () => {
    const r = parseFloat(form.r) || 0, vi = parseFloat(form.vi) || 0, m = parseFloat(mq), cm = parseFloat(form.cm);
    const zd = ZT[zona] || { min: 0, max: 0 };
    const fc = canoneConFascia(zd, m, sottofascia, maggArredo, maggDurata);
    setRis(calcola({
      rendita: r, valoreImmobile: vi, mq: m, zona,
      canoneAnnuo: cm * 12, canoneConc: fc.canoneMax,
      condoMese: form.co ? parseFloat(form.co) : 0, manuAnno: form.mn ? parseFloat(form.mn) : 0
    }));
    setStep(6);
  };
  const reset = () => {
    setStep(0); setAddr(""); setGeoResult(null); setZona(null); setMq(""); setStato("normale");
    setForm({ r: "", vi: "", cm: "", co: "", mn: "" }); setAttivi([2, 4]); setMaggArredo("no");
    setMaggDurata("3"); setRis(null); setFiscalTab("ced"); setIrpefScag(0);
  };

  const getV = (sc, n) => {
    if (!ris) return 0;
    if (sc === "sfitta") return ris.sfitta[n];
    if (fiscalTab === "ced") return ris[sc][n].netto;
    const map = { conc: "concIrpef", lib: "libIrpef", ers: "ersIrpef" };
    return ris[map[sc]][irpefScag][`n${n}`];
  };

  const isBest = (sc, n) => {
    if (!ris || sc === "sfitta") return false;
    const val = getV(sc, n);
    const maxVal = Math.max(getV("conc", n), getV("lib", n), getV("ers", n));
    return val === maxVal && val > 0;
  };

  const stepLabels = ["", "Indirizzo", "Superficie", "Dati economici", "Caratteristiche", "Maggiorazioni", "Risultati"];

          </div>

          <div className="info-box-blue" style={{ marginBottom: "1.5rem" }}>

            </div>

        </div>
      )}

      {step >= 1 && step <= 5 && (
        <div style={{ marginBottom: "1.5rem" }}>
          <div className="steps">
            {[1, 2, 3, 4, 5].map(s => (
              <div className="step-item" key={s}>

            <div className="hero-icon-box">📍</div>
          </div>
          <div className="question-title">Dove si trova l'immobile?</div>
          <div className="input-group">
            <input className="input-large" type="text" placeholder="es. Via Roma 15, Genova" value={addr} onChange={e => setAddr(e.target.value)} onKeyDown={e => e.key === "Enter" && cerca()} />
          </div>
          <button className="btn-calc" onClick={cerca} disabled={loading || !addr.trim()} style={{ marginBottom: "1rem" }}>{loading ? "⏳ Ricerca..." : "🔍 Cerca indirizzo"}</button>
          {loading && <div className="loading">⏳ Ricerca in corso...</div>}
          {geoErr && <div className="error-message">⚠️ {geoErr}</div>}
          {geoResult && zona && (
            <div className="info-box">
              <div className="info-title">✅ Zona rilevata</div>
              <div className="info-content">
                <strong>{zona}</strong> - {window.OMI_DESC?.[zona] || OMI_DESC_FALLBACK[zona] || "Zona OMI"}<br/>
                Fascia canone: {fEur(ZT[zona]?.min)}/mq/anno – {fEur(ZT[zona]?.max)}/mq/anno
              </div>
            </div>
          )}
          {geoResult && !zona && (
            <div className="error-message">⚠️ Indirizzo fuori dai poligoni OMI. Seleziona zona manualmente.</div>
          )}
          {geoResult && !zona && (
            <div className="features-grid" style={{ maxHeight: "300px" }}>
              {Object.keys(ZT).map(z => (
                <button key={z} className={`feature-pill ${zona === z ? "selected" : ""}`} onClick={() => setZona(z)}>
                  <span>{z}</span>
                </button>
              ))}
            </div>
          )}
          <div className="nav-buttons">
            <button className="btn-back" onClick={() => setStep(0)}>← Indietro</button>
            <button className="btn-next" onClick={vaiStep2} disabled={!zona}>Continua →</button>
          </div>
        </div>
      )}

      {/* Step 2 - Superficie e stato */}
      {step === 2 && (
        <div className="card">
          <div className="hero-icon">
            <div className="hero-icon-box">📐</div>
          </div>
          <div className="question-title">Qual è la superficie utile?</div>
          <div className="input-group">
            <input className="input-large" type="number" min="0" placeholder="es. 75" value={mq} onChange={e => setMq(e.target.value)} />
            <div className="input-suffix">metri quadrati (mq)</div>
          </div>
          <div className="question-title" style={{ fontSize: "1.2rem", marginTop: "1rem", marginBottom: "1rem" }}>Stato conservativo</div>
          <div className="options-grid">
            {Object.entries(STATO_LABELS).map(([k, { label, icon, desc }]) => (
              <div key={k} className={`option-card ${stato === k ? "selected" : ""}`} onClick={() => setStato(k)}>
                <div className="option-emoji">{icon}</div>
                <div className="option-title">{label}</div>
                <div className="option-desc">{desc}</div>
              </div>
            ))}
          </div>
          {omiSug && parseFloat(mq) > 0 && (
            <div className="info-box">
              <div className="info-title">💡 Stima OMI · {STATO_LABELS[stato].label}</div>
              <div className="info-content">
                Valore stimato: <strong>{fEur(omiSug.vi)}</strong><br/>
                Canone stimato: <strong>{fEur(omiSug.cm)}/mese</strong>
              </div>
            </div>
          )}
          {s2err && <div className="error-message">⚠️ {s2err}</div>}
          <div className="nav-buttons">
            <button className="btn-back" onClick={() => setStep(1)}>← Indietro</button>
            <button className="btn-next" onClick={vaiStep3}>Continua →</button>
          </div>
        </div>

      {/* Step 3 - Dati economici */}
      {step === 3 && (
        <div className="card">
          <div className="hero-icon">
            <div className="hero-icon-box">💶</div>
          </div>
          <div className="question-title" style={{ fontSize: "1.2rem" }}>Dati economici</div>
          <div className="badge">📍 Zona {zona} · {mq} mq · {STATO_LABELS[stato].label}</div>
          <div className="input-group">
            <input className="input-large" type="number" placeholder="Rendita catastale (€/anno)" value={form.r} onChange={e => fa("r", e.target.value)} />
            <div className="input-suffix">opzionale - dalla visura catastale</div>
          </div>
          <div className="input-group">
            <input className="input-large" type="number" placeholder="Valore di mercato (€)" value={form.vi} onChange={e => fa("vi", e.target.value)} />
            <div className="input-suffix">stimato OMI - modificabile</div>
          </div>
          <div className="input-group">
            <input className="input-large" type="number" placeholder="Canone desiderato (€/mese)" value={form.cm} onChange={e => fa("cm", e.target.value)} />
            <div className="input-suffix">per lo scenario libero mercato</div>
          </div>
          <div className="input-group">
            <input className="input-large" type="number" placeholder="Spese condominiali (€/mese)" value={form.co} onChange={e => fa("co", e.target.value)} />
            <div className="input-suffix">opzionale - stima 50€/mese</div>
          </div>
          <div className="input-group">
            <input className="input-large" type="number" placeholder="Manutenzione annua (€/anno)" value={form.mn} onChange={e => fa("mn", e.target.value)} />
            <div className="input-suffix">opzionale - stima 0.5% del valore</div>
          </div>
          {s3err && <div className="error-message">⚠️ {s3err}</div>}
          <div className="nav-buttons">
            <button className="btn-back" onClick={() => setStep(2)}>← Indietro</button>
            <button className="btn-next" onClick={vaiStep4}>Continua →</button>
          </div>
        </div>
      )}

      {/* Step 4 - Caratteristiche */}
      {step === 4 && (
        <div className="card">

          </div>
          <div className="question-title" style={{ fontSize: "1.2rem" }}>Caratteristiche dell'immobile</div>
          <div className="info-box-blue" style={{ marginBottom: "1rem" }}>
            <div className="info-content">Seleziona gli elementi presenti. Determinano la sottofascia del canone concordato.</div>
          </div>
          <div className="features-grid">
            {ELEMENTI.map(el => {
              const isOn = attivi.includes(el.id);
              return (
                <div key={el.id} className={`feature-pill ${isOn ? "selected" : ""}`} onClick={() => setAttivi(p => p.includes(el.id) ? p.filter(x => x !== el.id) : [...p, el.id])}>
                  <span className="emoji">{el.icon}</span>
                  <span>{el.label}</span>
                  {el.obbl && <span style={{ fontSize: "0.6rem", opacity: 0.7 }}>●</span>}
                </div>
              );
            })}
          </div>
          <div className="info-box">
            <div className="info-title">📊 Sottofascia {sottofascia}</div>
            <div className="info-content">
              {sottofascia === 1 && "Sottofascia bassa (1–2 elementi)"}

              {fasciaCalc && <span><br/>Canone concordato: <strong>{fEur(fasciaCalc.canoneMin / 12)}/mese – {fEur(fasciaCalc.canoneMax / 12)}/mese</strong></span>}
            </div>

                <div className="result-header">
                  <span className="result-badge conc">C</span>
                  {isBest("conc", periodo) && <span className="best-tag">★ MIGLIORE</span>}
                  <div className="result-title">🤝 Canone concordato</div>
                  <div className="result-sub">{fEur(ris.cConc / 12)}/mese · Ced.10% · IMU -25%</div>
                </div>
                <div className="result-body">
                  {periodi.map(p => (
                    <div className="result-row" key={p}>
                      <span className="result-label">{p} {p === 1 ? "anno" : "anni"}</span>
                      <span className={`result-value ${getV("conc", p) >= 0 ? "positive" : "negative"}`}>{fEur(getV("conc", p), true)}</span>
                    </div>
                  ))}
                </div>
                <div className="result-footer">Sottofascia {sottofascia} · Magg. +{Math.round((fasciaCalc?.totPerc || 0) * 100)}%</div>
              </div>
            )}

            {/* Libero mercato - mostra solo se espanso */}
            {mostraAltri && (
              <div className={`result-card ${isBest("lib", periodo) ? "best" : ""}`}>
                <div className="result-header">
                  <span className="result-badge lib">D</span>
                  {isBest("lib", periodo) && <span className="best-tag">★ MIGLIORE</span>}
                  <div className="result-title">🏘️ Libero mercato</div>
                  <div className="result-sub">{fEur(ris.canoneAnnuo / 12)}/mese · Ced.21% · IMU ordinaria</div>
                </div>
                <div className="result-body">
                  {periodi.map(p => (
                    <div className="result-row" key={p}>
                      <span className="result-label">{p} {p === 1 ? "anno" : "anni"}</span>
                      <span className={`result-value ${getV("lib", p) >= 0 ? "positive" : "negative"}`}>{fEur(getV("lib", p), true)}</span>
                    </div>
                  ))}
                </div>
                <div className="result-footer">📈 Massimo potenziale</div>
              </div>
            )}
          </div>

          {/* Bottone mostra altre soluzioni */}
          <div className="card" style={{ marginBottom: "1rem" }}>
            <button className="btn-outline" style={{ width: "100%" }} onClick={() => setMostraAltri(!mostraAltri)}>
              {mostraAltri ? "▲ Nascondi altre soluzioni" : "▼ Mostra altre soluzioni"}
            </button>
          </div>

          {/* Analisi dettagliata */}
          <div className="card" style={{ marginBottom: "1rem" }}>
            <button className="btn-outline" style={{ width: "100%" }} onClick={() => setMostraAnalisi(!mostraAnalisi)}>
              {mostraAnalisi ? "▲ Nascondi analisi" : "▼ Mostra analisi dettagliata"}
            </button>
            {mostraAnalisi && (
              <div style={{ marginTop: "1.5rem" }}>
                <div style={{ fontWeight: 700, marginBottom: "0.75rem" }}>Confronto su {periodo} {periodo === 1 ? "anno" : "anni"}</div>
                {["conc", "lib", "ers"].map(sc => {
                  const v = getV(sc, periodo);
                  const maxV = Math.max(getV("conc", periodo), getV("lib", periodo), getV("ers", periodo));
                  const percent = maxV > 0 ? (v / maxV) * 100 : 0;
                  return (
                    <div key={sc} style={{ marginBottom: "0.75rem" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.8rem", marginBottom: "0.25rem" }}>
                        <span>{sc === "conc" ? "🤝 Concordato" : sc === "lib" ? "🏘️ Libero" : "🏛️ ERS"}</span>
                        <span className={v >= 0 ? "positive" : "negative"} style={{ fontWeight: 700 }}>{fEur(v, true)}</span>
                      </div>
                      <div style={{ background: "#e5e7eb", borderRadius: "60px", height: "8px", overflow: "hidden" }}>
                        <div style={{ width: `${percent}%`, background: v >= 0 ? "#059669" : "#dc2626", height: "100%", borderRadius: "60px" }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Note e azioni */}
          <div className="notes">
            <strong>Note metodologiche:</strong><br/>
            Zona {zona}: {fEur(ZT[zona]?.min)}/mq/anno – {fEur(ZT[zona]?.max)}/mq/anno<br/>
            IMU 2026 Genova: ordinaria 1,06% · concordato -25%<br/>
            TARI: {ris.tariSfitta.toFixed(0)} €/anno a carico proprietario se sfitta<br/>
            <strong>Strumento orientativo - non sostituisce consulenza professionale</strong>
          </div>

          <div className="action-buttons">
            <button className="btn-outline" onClick={reset}>🔄 Nuova simulazione</button>
            <button className="btn-print" onClick={() => window.print()}>🖨️ Stampa PDF</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
