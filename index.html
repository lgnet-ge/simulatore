<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulatore Locazione Genova 2025</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:#1e3a8a; --navy2:#1e40af;
      --brass:#d97706; --brass-light:#f59e0b; --brass-pale:#fef3c7;
      --bg:#f3f4f6; --bg2:#e5e7eb; --white:#ffffff;
      --text:#1f2937; --muted:#6b7280; --muted2:#9ca3af;
      --green:#059669; --green-bg:#d1fae5;
      --red:#dc2626; --red-bg:#fee2e2;
      --border:#e5e7eb; --border2:#d1d5db;
      --shadow: 0 8px 30px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --radius:32px; --radius-sm:20px; --radius-xs:60px;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
    .app { max-width:720px; margin:0 auto; padding:1.5rem 1rem 3rem; }

    /* Hero header */
    .hero { background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 60%,#2563eb 100%); border-radius:var(--radius); margin-bottom:1rem; padding:2rem 1.75rem; }
    .hero h1 { font-size:clamp(1.5rem,3vw,2rem); color:#fff; font-weight:700; line-height:1.2; margin-bottom:.5rem; }
    .hero h1 em { font-style:normal; color:#fbbf24; }
    .hero-meta { font-size:.78rem; color:rgba(255,255,255,.6); line-height:1.7; }
    .disc { background:rgba(255,255,255,.08); border-left:3px solid #fbbf24; border-radius:8px; padding:.65rem 1rem; color:rgba(255,255,255,.65); font-size:.77rem; margin-top:1rem; line-height:1.55; }

    /* Steps */
    .steps { display:flex; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:.5rem; }
    .step-item { flex:1; text-align:center; }
    .step-circle { width:40px; height:40px; background:#e5e7eb; border-radius:999px; display:flex; align-items:center; justify-content:center; margin:0 auto .4rem; font-weight:700; font-size:1rem; color:#6b7280; transition:all .2s; }
    .step-circle.active { background:#1e3a8a; color:white; box-shadow:0 4px 12px rgba(30,58,138,.3); }
    .step-circle.done { background:#059669; color:white; }
    .step-label { font-size:.65rem; font-weight:600; color:#6b7280; text-transform:uppercase; }
    .step-label.active { color:#1e3a8a; }
    .step-label.done { color:#059669; }

    /* Card */
    .card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:2rem 1.75rem; margin-bottom:1rem; }

    /* Hero icon */
    .hero-icon { text-align:center; margin:.5rem 0 1.5rem; }
    .hero-icon-box { background:#dbeafe; width:90px; height:90px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:3rem; box-shadow:0 4px 12px rgba(30,58,138,.1); }

    /* Question title */
    .stitle, .question-title { text-align:center; font-size:1.35rem; font-weight:700; color:#1f2937; margin-bottom:1.5rem; line-height:1.3; }
    .stitle { text-align:left; font-size:1.1rem; }

    /* Badge */
    .badge { display:inline-flex; align-items:center; gap:6px; background:#dbeafe; padding:.3rem .9rem; border-radius:40px; font-size:.75rem; font-weight:600; color:#1e3a8a; }

    /* Search row */
    .arow { display:flex; gap:10px; }
    .ainput { flex:1; border:2px solid var(--border); border-radius:var(--radius-xs); padding:.85rem 1.25rem; font-family:'Inter',sans-serif; font-size:1rem; font-weight:500; color:var(--text); background:white; outline:none; transition:border-color .2s,box-shadow .2s; }
    .ainput:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,58,138,.1); }

    /* Buttons */
    .btn { padding:.85rem 1.75rem; border:none; border-radius:var(--radius-xs); font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--navy); color:#fff; box-shadow:0 2px 8px rgba(30,58,138,.2); }
    .btn-primary:hover { background:#1e40af; transform:translateY(-1px); }
    .btn-primary:disabled { background:#9ca3af; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-gold { background:var(--brass); color:#fff; }
    .btn-gold:hover { background:var(--brass-light); transform:translateY(-1px); }
    .btn-outline { background:transparent; border:2px solid var(--border); color:#4b5563; border-radius:var(--radius-xs); padding:.75rem 1.5rem; font-family:'Inter',sans-serif; font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; }
    .btn-outline:hover { background:#f3f4f6; }
    .btn-sm { padding:.5rem 1rem; font-size:.8rem; }
    .btn-calcola { background:#1e3a8a; color:#fff; border:none; border-radius:var(--radius-xs); padding:.95rem 2rem; font-family:'Inter',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; box-shadow:0 4px 16px rgba(30,58,138,.25); }
    .btn-calcola:hover { background:#1e40af; transform:translateY(-1px); }

    /* Zone result */
    .zona-ok { background:var(--green-bg); border-radius:var(--radius-sm); padding:1.2rem 1.4rem; margin-top:1rem; }
    .zona-ok h3 { font-size:1rem; color:var(--green); margin-bottom:.4rem; font-weight:700; }
    .zona-code { font-size:2rem; font-weight:700; color:var(--navy); }
    .zona-range { font-size:.85rem; color:var(--muted); margin-top:.3rem; }
    .zona-actions { display:flex; gap:10px; margin-top:1rem; flex-wrap:wrap; }
    .geo-info { background:var(--brass-pale); border-left:4px solid var(--brass); border-radius:var(--radius-sm); padding:1rem 1.2rem; margin-top:1rem; font-size:.83rem; line-height:1.6; }
    .geo-info strong { color:var(--navy); }
    .geo-method { display:inline-block; padding:.15rem .5rem; border-radius:3px; font-size:.7rem; font-weight:700; margin-left:6px; }
    .geo-exact { background:#e8f5f0; color:#1a5c2a; }
    .geo-approx { background:#fff3e0; color:#8b4f00; }

    /* Zone grid */
    .mgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-top:1rem; max-height:340px; overflow-y:auto; padding-right:4px; }
    .zbtn { padding:.5rem; border:2px solid var(--border); border-radius:16px; background:var(--bg); cursor:pointer; font-family:'Inter',sans-serif; font-size:.75rem; font-weight:700; color:var(--text); transition:all .15s; text-align:center; }
    .zbtn:hover { border-color:var(--navy); }
    .zbtn.sel { border-color:var(--navy); background:var(--navy); color:#fff; box-shadow:0 2px 8px rgba(30,58,138,.3); }
    .zbtn .zr { font-size:.62rem; font-weight:400; opacity:.75; display:block; margin-top:2px; }

    /* Field grid */
    .fgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.25rem; }
    .field { display:flex; flex-direction:column; gap:.4rem; }
    .field label { font-size:.85rem; font-weight:700; color:#1f2937; }
    .field input,.field select { border:2px solid var(--border); border-radius:var(--radius-sm); padding:.85rem 1.1rem; font-family:'Inter',sans-serif; font-size:.95rem; color:var(--text); background:white; outline:none; transition:border-color .2s,box-shadow .2s; }
    .field input:focus,.field select:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,58,138,.1); }
    .field .hint { font-size:.72rem; color:var(--muted); }

    /* Messages */
    .err { background:var(--red-bg); border-radius:var(--radius-sm); padding:.75rem 1rem; font-size:.85rem; font-weight:600; color:var(--red); margin-top:.75rem; }
    .warn { background:#fffbeb; border-left:4px solid #d97706; border-radius:var(--radius-sm); padding:.75rem 1rem; font-size:.83rem; margin-top:.75rem; line-height:1.6; }
    .info-box { background:#dbeafe; border-left:4px solid var(--navy); border-radius:var(--radius-sm); padding:.75rem 1.25rem; font-size:.83rem; margin-top:.75rem; line-height:1.6; }
    .info-box strong { color:var(--navy); }
    .loading { color:var(--muted); font-size:.85rem; margin-top:.5rem; display:flex; align-items:center; gap:8px; }

    /* RISULTATI */
    .results { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1.25rem; margin-bottom:2rem; }
    .scard { background:white; border-radius:24px; overflow:hidden; box-shadow:var(--shadow-md); transition:transform .2s,box-shadow .2s; border:1px solid var(--border); }
    .scard-best { border:2px solid var(--brass); box-shadow:0 4px 16px rgba(217,119,6,.15); }
    .scard-best .ch2 { background:linear-gradient(135deg,#1e3a8a,#1d4ed8); }
    .scard-best .ch2 h3 { color:#fff; }
    .scard-best .ch2 .sub { color:rgba(255,255,255,.7); }
    .scard-best .ctag { background:rgba(255,255,255,.2); color:#fff; }
    .best-badge { display:inline-block; background:var(--brass); color:#fff; font-size:.6rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:.2rem .65rem; border-radius:20px; margin-left:6px; vertical-align:middle; }
    .scard:hover { transform:translateY(-3px); box-shadow:0 8px 32px rgba(0,0,0,.1); }
    .ch2 { padding:1.1rem 1.3rem .9rem; border-bottom:1px solid var(--border); background:#f9fafb; }
    .ctag { font-size:.63rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:.22rem .55rem; border-radius:20px; display:inline-block; margin-bottom:.5rem; }
    .t-s { background:#fee2e2; color:#dc2626; }
    .t-c { background:#dbeafe; color:#1e3a8a; }
    .t-l { background:#d1fae5; color:#059669; }
    .t-e { background:#fef3c7; color:#d97706; }
    .ch2 h3 { font-size:1.05rem; font-weight:700; color:var(--navy); margin-bottom:.25rem; }
    .ch2 .sub { font-size:.72rem; color:var(--muted); line-height:1.4; }
    .cb { padding:1rem 1.3rem; background:white; }
    .trow { display:flex; align-items:center; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid #f3f4f6; }
    .trow:last-child { border-bottom:none; }
    .tl { font-size:.8rem; color:var(--muted); }
    .tv { font-size:.95rem; font-weight:700; font-variant-numeric:tabular-nums; }
    .tv-small { font-size:.8rem; font-weight:600; font-variant-numeric:tabular-nums; color:var(--muted); }
    .pos { color:var(--green); } .neg { color:var(--red); } .best { color:var(--green); } .worst { color:var(--red); }
    .cf { padding:.65rem 1.3rem; background:#f9fafb; border-top:1px solid var(--border); font-size:.7rem; color:var(--muted); line-height:1.5; }

    /* TAB FISCALE */
    .fiscal-tabs { display:flex; gap:.5rem; margin-bottom:1rem; flex-wrap:wrap; }
    .fiscal-tab { flex:1; padding:.6rem 1rem; border:2px solid var(--border); background:white; border-radius:var(--radius-xs); font-weight:600; font-size:.85rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; color:var(--muted); }
    .fiscal-tab.on { background:var(--navy); border-color:var(--navy); color:#fff; }
    .fiscal-section { background:#f9fafb; border-radius:var(--radius-sm); padding:1rem; margin-bottom:1rem; }

    /* TABELLA */
    .twrap { background:white; border-radius:var(--radius-sm); overflow:hidden; box-shadow:var(--shadow-md); margin-bottom:2rem; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:580px; }
    thead tr { background:var(--navy); }
    thead th { padding:.85rem 1.1rem; text-align:left; font-size:.7rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.7); }
    thead th:first-child { color:#fff; }
    tbody tr { border-bottom:1px solid var(--border); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:nth-child(even) { background:var(--bg); }
    tbody td { padding:.75rem 1.1rem; font-size:.82rem; }
    tbody td:first-child { font-weight:600; color:var(--navy); }
    .sub-row { font-size:.72rem; color:var(--muted); display:block; }

    /* GRAFICO */
    .pbtn { display:flex; gap:8px; margin-bottom:1.2rem; flex-wrap:wrap; }
    .pbtn button { padding:.5rem 1.1rem; border:2px solid var(--border); border-radius:var(--radius-xs); background:white; color:var(--text); cursor:pointer; font-family:'Inter',sans-serif; font-size:.82rem; font-weight:600; transition:all .15s; }
    .pbtn button.a { background:var(--navy); color:#fff; border-color:var(--navy); }
    .bg { margin-bottom:1.2rem; }
    .bg-label { font-size:.76rem; font-weight:600; color:var(--text); margin-bottom:.35rem; }
    .bt { background:var(--bg2); border-radius:60px; height:34px; overflow:hidden; }
    .bf { height:100%; border-radius:60px; display:flex; align-items:center; padding:0 12px; font-size:.78rem; font-weight:700; color:#fff; min-width:90px; transition:width .6s ease; }
    .bf-s { background:linear-gradient(90deg,#9b2335,#c74455); }
    .bf-c { background:linear-gradient(90deg,#1e3a8a,#3058c9); }
    .bf-l { background:linear-gradient(90deg,#1a5c2a,#2d8b45); }
    .bf-e { background:linear-gradient(90deg,#8b4f00,#c97a00); }
    .note { background:#f9fafb; border-radius:var(--radius-sm); padding:1.1rem 1.3rem; font-size:.8rem; color:var(--muted); line-height:1.7; }
    .note ul { padding-left:1.1rem; }
    .note li { margin-bottom:.35rem; }
    .note strong { color:var(--text); }
    .rlink { font-size:.78rem; color:var(--muted); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0; }
    .rlink:hover { color:var(--navy); }
    .zbar { background:var(--bg); border-radius:var(--radius-sm); padding:.7rem 1rem; margin-bottom:1.2rem; font-size:.82rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .pill-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:.75rem; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:.5rem .9rem; border:2px solid var(--border); border-radius:60px; background:white; cursor:pointer; font-family:'Inter',sans-serif; font-size:.8rem; font-weight:600; color:var(--text); transition:all .18s; user-select:none; }
    .pill:hover { border-color:var(--green); }
    .pill.on { background:var(--green-bg); border-color:var(--green); color:var(--green); font-weight:700; }
    .pill-icon { font-size:1rem; line-height:1; }
    .sf-box { background:var(--bg); border-radius:var(--radius-sm); padding:1rem 1.2rem; margin-top:1rem; display:flex; align-items:center; gap:1.2rem; flex-wrap:wrap; }
    .sf-num { font-size:2rem; font-weight:700; color:var(--navy); }
    .sf-label { font-size:.8rem; color:var(--muted); line-height:1.6; }
    .sf-label strong { color:var(--text); display:block; font-size:.95rem; margin-bottom:2px; }
    .magg-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin-top:.75rem; }
    .magg-grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-top:.75rem; }
    .magg-item { background:white; border:2px solid var(--border); border-radius:var(--radius-sm); padding:.75rem 1rem; cursor:pointer; transition:all .18s; text-align:left; }
    .magg-item:hover { border-color:var(--green); }
    .magg-item.on { background:var(--green-bg); border-color:var(--green); }
    .magg-item .mt { font-size:.8rem; font-weight:600; color:var(--text); }
    .magg-item .ms { font-size:.7rem; color:var(--muted); margin-top:2px; font-weight:400; }
    .magg-item .mp { font-size:1.05rem; font-weight:800; color:var(--green); margin-top:5px; }
    .sec-hdr { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text); margin:1.3rem 0 .5rem; padding-bottom:.4rem; border-bottom:2px solid var(--border); }
    .irpef-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; margin-top:.5rem; }
    .irpef-sc { background:white; border:2px solid var(--border); border-radius:var(--radius-sm); padding:.75rem 1rem; font-size:.78rem; cursor:pointer; transition:all .2s; }
    .irpef-sc.on { border-color:var(--navy); background:#dbeafe; }
    .irpef-sc .isc-title { font-weight:700; color:var(--navy); font-size:.75rem; }
    .irpef-sc .isc-val { font-size:1.05rem; font-weight:700; margin-top:3px; }
    .irpef-sc .isc-sub { font-size:.67rem; color:var(--muted); margin-top:2px; }
    .delta-badge { display:inline-block; padding:.1rem .4rem; border-radius:3px; font-size:.7rem; font-weight:700; }
    .delta-pos { background:#e8f5f0; color:#1a5c2a; }
    .delta-neg { background:#fee8e8; color:#8b1a2a; }

    @media print {
      /* Mostra solo header + 4 card risultati */
      .hero, .steps, .card, .btn, .pbtn,
      .twrap, .note, .bg, .fiscal-tabs, .fiscal-section,
      .stitle, .pbtn, [class*="warn"], [class*="info-box"] { display: none !important; }
      .print-header { display: block !important; margin-bottom: 14px; border-bottom: 2px solid #0f1e2e; padding-bottom: 10px; }
      .results { display: grid !important; grid-template-columns: repeat(2,1fr); gap: 10px; margin: 0 !important; }
      .scard { display: block !important; box-shadow: none !important; break-inside: avoid; }
      .scard-best { border: 2px solid #2d7a5f !important; }
      body { background: #fff; color: #000; font-size: 10pt; }
      .app { max-width: 100%; padding: 0; }
      @page { margin: 1.2cm; size: A4; }
    }
    .print-header { display: none; }


    /* ── SCHEDE INFORMATIVE ─────────────────────────────────────────────── */
    .schede-layout { display:grid; grid-template-columns:200px 1fr 200px; gap:1rem; margin-bottom:2rem; align-items:start; }
    .scheda { border-radius:var(--radius-sm); padding:1.25rem; display:flex; flex-direction:column; gap:.4rem; }
    .scheda-sfitta { background:#fff1f2; border:2px solid #fda4af; }
    .scheda-ers { background:#f0fdf4; border:2px solid #86efac; }
    .scheda-icon { font-size:1.6rem; line-height:1; margin-bottom:.1rem; }
    .scheda-title { font-size:1rem; font-weight:700; line-height:1.25; margin-bottom:.2rem; }
    .scheda-sfitta .scheda-title { color:#881337; }
    .scheda-ers .scheda-title { color:#14532d; }
    .scheda-msg { font-size:.73rem; font-weight:600; font-style:italic; line-height:1.45; padding:.45rem .6rem; border-radius:8px; margin-bottom:.3rem; }
    .scheda-sfitta .scheda-msg { background:#ffe4e6; color:#881337; border-left:3px solid #f43f5e; }
    .scheda-ers .scheda-msg { background:#dcfce7; color:#14532d; border-left:3px solid #22c55e; }
    .scheda-item { display:flex; gap:.4rem; font-size:.72rem; line-height:1.4; color:#1f2937; align-items:flex-start; }
    .scheda-bullet { flex-shrink:0; font-size:.6rem; margin-top:.25rem; opacity:.5; }
    .scheda-divider { height:1px; margin:.4rem 0; }
    .scheda-sfitta .scheda-divider { background:#fecdd3; }
    .scheda-ers .scheda-divider { background:#bbf7d0; }
    .scheda-stat { padding:.5rem .65rem; border-radius:8px; font-size:.7rem; font-weight:500; line-height:1.3; }
    .scheda-sfitta .scheda-stat { background:#ffe4e6; color:#881337; }
    .scheda-ers .scheda-stat { background:#dcfce7; color:#14532d; }
    .scheda-stat-num { font-size:1.3rem; font-weight:700; display:block; line-height:1.1; margin-bottom:.1rem; }
    @media(max-width:900px){ .schede-layout { grid-template-columns:1fr; } }

    .nav-btns { display:flex; justify-content:space-between; align-items:center; margin-top:1.75rem; gap:1rem; }
    .nav-btns-right { display:flex; justify-content:flex-end; margin-top:1.75rem; }
    .btn-back { background:transparent; border:2px solid var(--border); border-radius:var(--radius-xs); padding:.8rem 1.5rem; font-family:'Inter',sans-serif; font-size:.9rem; font-weight:600; color:#4b5563; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
    .btn-back:hover { background:#f3f4f6; border-color:#d1d5db; }
    .btn-next { background:var(--navy); color:#fff; border:none; border-radius:var(--radius-xs); padding:.85rem 1.75rem; font-family:'Inter',sans-serif; font-size:.9rem; font-weight:700; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; box-shadow:0 2px 8px rgba(30,58,138,.2); }
    .btn-next:hover { background:var(--navy2); transform:translateY(-1px); box-shadow:0 4px 12px rgba(30,58,138,.3); }
    .btn-next:disabled { background:#9ca3af; cursor:not-allowed; transform:none; box-shadow:none; }

    @media(max-width:600px) {
      .results { grid-template-columns:1fr; }
      .fgrid { grid-template-columns:1fr; }
      .steps { gap:.5rem; }
      .arow { flex-direction:column; }
      .magg-grid { grid-template-columns:1fr; }
      .irpef-grid { grid-template-columns:1fr; }
      .card { padding:1.5rem; }
      .hero { border-radius:20px; padding:1.5rem; }
      .nav-btns { flex-direction:column; }

function canoneConFascia(zd, mq, sottofascia, maggArredo, maggDurata) {
  const ampiezza = zd.max - zd.min;
  const terzo = ampiezza / 3;
  const sfMin = zd.min + (sottofascia - 1) * terzo;
  const sfMax = zd.min + sottofascia * terzo;
  const base = sfMax * mq;
  const percArredo = maggArredo === "completo" ? 0.12 : maggArredo === "parziale" ? 0.06 : 0;
  const percDurata = maggDurata === "4" ? 0.02 : maggDurata === "5" ? 0.04 : maggDurata === "6" ? 0.06 : 0;
  const totPerc = percArredo + percDurata;
  return { sfMin:sfMin*mq, sfMax:sfMax*mq, canoneMin:sfMin*mq*(1+totPerc), canoneMax:base*(1+totPerc), percArredo, percDurata, totPerc };
}

// ottimo = 90% del max, normale = media min/max, lavori = 110% del min
function omiSuggerimenti(zona, mq, stato) {
  const ov = OMI_VALORI[zona];
  if (!ov || !mq) return null;
  let aqUnit, lcUnit;
  // Stime conservative (al ribasso rispetto ai valori OMI ufficiali)
  if (stato === "ottimo")  { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.50; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.50; }
  if (stato === "normale") { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.25; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.25; }

  return {
    vi: Math.round(aqUnit * mq),
    cm: Math.round(lcUnit * mq),
    aqUnit: Math.round(aqUnit),
    lcUnit: lcUnit.toFixed(1),
  };
}

async function geocode(address) {
  const q = encodeURIComponent(address + ", Genova, Liguria, Italia");
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=it&addressdetails=1&accept-language=it`;
  const res = await fetch(url, { headers:{"Accept-Language":"it","User-Agent":"ComparatoreLocazioneGenova/1.0"} });
  if (!res.ok) throw new Error("Errore geocoding");
  const data = await res.json();
  if (!data.length) throw new Error("Indirizzo non trovato");
  return data[0];
}

const IMU_ORD=0.0106, IMU_MOLT=160, IMU_RIVAL=1.05, IMU_RID_CONC=0.25;
const CED_LIB=0.21, CED_CONC=0.10, ARTE_SCONTO=0.25, IRPEF_DED=0.05, TEFA=0.03;
const TARI_TAB=[[0.927,89.68],[1.098,209.26],[1.226,216.73],[1.333,230.19],[1.439,260.08],[1.514,279.51]];
function calcolaTari(mq) { const [f,v]=TARI_TAB[0]; return (f*mq+v)*(1+TEFA); }
const IRPEF_SCAGLIONI=[
  {label:"23% (fino €28.000)",aliq:0.23,desc:"Reddito complessivo ≤ €28.000"},
  {label:"35% (€28–50k)",     aliq:0.35,desc:"Reddito complessivo €28.001–€50.000"},
  {label:"43% (oltre €50k)",  aliq:0.43,desc:"Reddito complessivo oltre €50.000"},
];

function fEur(v,sign=false){
  const f=new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Math.abs(v||0));
  if(sign) return (v>=0?"+":"-")+" "+f;
  return (v<0?"-":" ")+f;
}

function calcola({rendita,valoreImmobile,mq,zona,canoneAnnuo,canoneConc,condoMese,manuAnno}){
  const renditaStimata = rendita<=0;
  const renditaEff = rendita>0 ? rendita : valoreImmobile/(IMU_RIVAL*IMU_MOLT);
  const imuOrd  = renditaEff*IMU_RIVAL*IMU_MOLT*IMU_ORD;
  const imuConc = imuOrd*(1-IMU_RID_CONC);
  const man  = manuAnno>0  ? manuAnno  : (valoreImmobile>0 ? valoreImmobile*0.005 : mq*3);
  const condo= condoMese>0 ? condoMese*12 : 600;
  const ass=250, tariSfitta=calcolaTari(mq);
  const costiBase=ass+condo+man;
  const zd=ZT[zona]||{min:0,max:0};
  const cConc=canoneConc||(zd.max*mq);
  const canoneERS=zd.max*mq*(1-ARTE_SCONTO);
  const sfittaCed=n=>-(imuOrd*1.1+tariSfitta+costiBase)*n;
  const concCed =n=>{const c=cConc,ced=c*CED_CONC;return{netto:(c-ced-imuConc-costiBase)*n,c,ced};};
  const libCed  =n=>{const c=canoneAnnuo,ced=c*CED_LIB;return{netto:(c-ced-imuOrd-costiBase)*n,c,ced};};
  const ersCed  =n=>{const c=canoneERS,ced=c*CED_CONC;return{netto:(c-ced-imuConc-costiBase)*n,c,ced};};
  const irpefN=(canone,aliq,imu,n)=>{const base=canone*(1-IRPEF_DED);return(canone-base*aliq-imu-costiBase)*n;};
  const concIrpef=IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(cConc,aliq,imuOrd,1),n3:irpefN(cConc,aliq,imuOrd,3),n5:irpefN(cConc,aliq,imuOrd,5)}));
  const libIrpef =IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(canoneAnnuo,aliq,imuOrd,1),n3:irpefN(canoneAnnuo,aliq,imuOrd,3),n5:irpefN(canoneAnnuo,aliq,imuOrd,5)}));
  const ersIrpef =IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(canoneERS,aliq,imuOrd,1),n3:irpefN(canoneERS,aliq,imuOrd,3),n5:irpefN(canoneERS,aliq,imuOrd,5)}));
  return{
    sfitta:{1:sfittaCed(1),3:sfittaCed(3),5:sfittaCed(5)},
    conc:{1:concCed(1),3:concCed(3),5:concCed(5),cUsato:cConc},
    lib:{1:libCed(1),3:libCed(3),5:libCed(5)},
    ers:{1:ersCed(1),3:ersCed(3),5:ersCed(5),cMese:canoneERS/12},
    concIrpef,libIrpef,ersIrpef,
    imuOrd,imuConc,costiBase,cConc,canoneAnnuo,canoneERS,tariSfitta,renditaEff,renditaStimata,
  };
}

      {/* HERO — visibile solo a step 0 */}
      {step===0&&(
      <div className="hero">
        <h1>Simulatore di <em>locazione</em> — Genova</h1>
        <div className="hero-meta">Accordo Territoriale · giugno 2025</div>
        <div className="disc">⚠️ Strumento orientativo — non sostituisce una consulenza professionale. I valori fiscali sono stime basate sui parametri inseriti.</div>
      </div>
      )}

      {/* STEPS INDICATOR */}
      {step > 0 && step < 6 && (
        <div className="steps">
          {stepLabels.map(([n,l],i)=>{
            const s=i+1;
            const cls=s<step?"done":s===step?"active":"";
            return(
              <div className="step-item" key={n}>
                <div className={`step-circle ${cls}`}>{s<step?"✓":n}</div>
                <div className={`step-label ${cls}`}>{l.replace(/^\S+\s/,"")}</div>
              </div>
            );
          })}
        </div>
      )}

            {/* ─── STEP 0: INTRO ─── */}
      {step===0&&(
        <div className="card" style={{textAlign:"center"}}>
          <div className="hero-icon"><div className="hero-icon-box">🏠</div></div>
          <h2 className="question-title">
            Scopri quanto vale affittare il tuo immobile a Genova
          </h2>
          <p style={{fontSize:".93rem",color:"var(--muted)",lineHeight:1.7,maxWidth:480,margin:"0 auto 1.5rem"}}>
            Questo simulatore confronta 4 scenari — casa sfitta, canone concordato, libero mercato e ERS — 
            calcolando il netto su 1, 3 e 5 anni con IMU 2026, TARI reale e regime fiscale a scelta.
          </p>
          <div className="info-box" style={{textAlign:"left",marginBottom:"1.75rem"}}>
            <strong>📍 Come funziona in 5 passi:</strong> indirizzo → zona OMI → superficie e stato → dati economici → caratteristiche → risultati in pochi secondi.
          </div>
          <button className="btn btn-primary" style={{fontSize:"1rem",padding:"1rem 2.5rem",width:"100%",maxWidth:320,justifyContent:"center"}}
            onClick={()=>setStep(1)}>
            Inizia la simulazione →
          </button>
          <div style={{marginTop:"1rem",fontSize:".72rem",color:"var(--muted)"}}>
            Dati: Accordo Territoriale Genova 29/05/2025 · Quotazioni OMI AdE 2° sem. 2025 · IMU DCC 60/2024
          </div>
        </div>
      )}

      {/* ─── STEP 1: INDIRIZZO ─── */}
      {step===1 && (
        <div className="card">
          <div className="hero-icon"><div className="hero-icon-box">📍</div></div>
          <div className="question-title">Indirizzo dell'immobile</div>
          <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.6,marginBottom:"1.25rem",textAlign:"center"}}>Inserisci l’indirizzo per identificare automaticamente la zona OMI di riferimento.</p>
          <div className="arow">
            <input className="ainput" type="text"
              placeholder="es. Via Balbi 4, Corso Buenos Aires 10, Via Rimassa 3..."
              value={addr} onChange={e=>setAddr(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!loading&&cerca()} />
            <button className="btn btn-primary" onClick={cerca} disabled={loading||!addr.trim()}>
              {loading?"⏳":"🔍"} Cerca
            </button>
          </div>
          {loading && <div className="loading">⏳ Geocoding in corso…</div>}
          {geoErr  && <div className="err">⚠️ {geoErr}</div>}

          {geoResult && (<>
            <div className="geo-info" style={{marginTop:"1rem"}}>
              <strong>📍 Indirizzo trovato:</strong> {geoResult.display_name?.split(",").slice(0,4).join(", ")}
              {geoMethod==="exact"  && <span className="geo-method geo-exact">✓ Zona rilevata dai poligoni OMI ufficiali</span>}
              {geoMethod==="manual" && <span className="geo-method geo-approx">⚠️ Fuori dai poligoni — seleziona manualmente</span>}
            </div>

            {zona && !mostraAll && (
              <div className="zona-ok">
                <h3>✅ Zona OMI rilevata</h3>
                <div className="zona-code">{zona}</div>
                {OMI_DESC[zona] && <div style={{fontSize:".85rem",color:"var(--navy)",fontWeight:600,marginTop:3}}>{OMI_DESC[zona]}</div>}
                {ZONA_MADRE[zona] && (
                  <div className="warn" style={{marginTop:".6rem",marginBottom:0}}>
                    ⚠️ Sottozona non presente nel dataset geometrico — basato sulla zona madre <strong>{ZONA_MADRE[zona]}</strong>.
                  </div>
                )}
                <div className="zona-range">Fascia canone concordato: {fEur(zd?.min||0)}/mq/anno – {fEur(zd?.max||0)}/mq/anno</div>
                <div className="zona-actions">
                  <div className="nav-btns">
                    <button className="btn-back" onClick={()=>setStep(0)}>← Indietro</button>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>setMostraAll(true)}>✏️ Cambia zona</button>
                      <button className="btn-next" onClick={confermZona}>Conferma →</button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {(!zona||mostraAll) && (
              <div style={{marginTop:"1rem"}}>
                {!zona && <div className="err" style={{marginBottom:"1rem"}}>⚠️ Indirizzo fuori dai poligoni OMI. Seleziona la zona manualmente.</div>}
                {mostraAll && <div style={{fontSize:".82rem",fontWeight:600,marginBottom:".5rem",color:"var(--navy)"}}>Seleziona la zona dall'Allegato 2:</div>}
                <div className="mgrid">
                  {Object.keys(ZT).map(z=>(
                    <button key={z} className={`zbtn ${zona===z?"sel":""}`} onClick={()=>setZona(z)}>
                      {z}<span className="zr">{fEur(ZT[z].min)}–{fEur(ZT[z].max)}</span>
                    </button>
                  ))}
                </div>
                {zona && <div className="nav-btns" style={{marginTop:"1rem"}}><button className="btn-back" onClick={()=>setStep(0)}>← Indietro</button><button className="btn-next" onClick={confermZona}>Conferma {zona} →</button></div>}
              </div>
            )}
          </>)}
        </div>
      )}

      {/* ─── STEP 2: SUPERFICIE + STATO CONSERVATIVO ─── */}
      {step===2 && (
        <div className="card">
          <div className="hero-icon"><div className="hero-icon-box">📐</div></div>
          <div className="question-title">Superficie e stato dell'immobile</div>
          <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.6,marginBottom:"1.25rem",textAlign:"center"}}>Indica la superficie utile e le condizioni generali dell’immobile. Questi dati permettono di stimare valore di mercato e canone tramite le quotazioni OMI ufficiali.</p>

          {step===2 && (<>
            <div className="fgrid" style={{marginBottom:"1.25rem"}}>
              <div className="field">
                <label>Superficie utile (mq) *</label>
                <input type="number" min="0" placeholder="es. 75" value={mq}
                  onChange={e=>{setMq(e.target.value); setForm(f=>({...f,vi:"",cm:""}));}} />
                <span className="hint">Da visura catastale o APE</span>
              </div>
            </div>

            <div className="sec-hdr">Stato conservativo</div>
            <div className="magg-grid">
              {Object.entries(STATO_LABELS).map(([k,{label,icon,desc}])=>(
                <button key={k} className={`magg-item ${stato===k?"on":""}`} onClick={()=>{setStato(k);setForm(f=>({...f,vi:"",cm:""}));}}>
                  <div className="mt">{icon} {label}</div>
                  <div className="ms">{desc}</div>
                </button>
              ))}
            </div>

            {/* Anteprima OMI */}
            {omiSug && parseFloat(mq)>0 && (
              <div className="info-box" style={{marginTop:"1rem",fontSize:".82rem",lineHeight:1.8}}>
                <strong>📊 Stima OMI — AdE 2° sem. 2025 · {STATO_LABELS[stato].label}</strong><br/>
                Valore di mercato stimato: <strong>{fEur(omiSug.vi)}</strong> ({omiSug.aqUnit.toLocaleString("it-IT")} €/mq)<br/>
                Canone di mercato stimato: <strong>{fEur(omiSug.cm)}/mese</strong> ({omiSug.lcUnit} €/mq/anno)<br/>
                <span style={{fontSize:".72rem",color:"var(--muted)"}}>Questi valori saranno precompilati nel prossimo step — modificabili liberamente</span>
              </div>
            )}
            {zona && !OMI_VALORI[zona] && parseFloat(mq)>0 && (
              <div className="warn" style={{marginTop:"1rem",fontSize:".82rem"}}>
                ⚠️ Nessun dato OMI disponibile per la zona {zona} — inserisci i valori manualmente nel prossimo step.
              </div>
            )}

            {s2err && <div className="err">⚠️ {s2err}</div>}
            <div className="nav-btns"><button className="btn-back" onClick={()=>setStep(1)}>← Indietro</button><button className="btn-next" onClick={vaiStep3}>Continua →</button></div>
          </>)}
        </div>
      )}

      {/* ─── STEP 3: DATI ECONOMICI ─── */}
      {(step===3||step===6) && (
        <div className="card">
          <div className="hero-icon"><div className="hero-icon-box">💶</div></div>
          <div className="question-title">Dati economici</div>
          <div className="zbar" style={{marginBottom:"1rem"}}>
            <span>📍 {addrShort} · Zona <strong>{zona}</strong>{OMI_DESC[zona]?` – ${OMI_DESC[zona]}`:""} · {mq} mq · {STATO_LABELS[stato].icon} {STATO_LABELS[stato].label}</span>
            <button className="rlink" onClick={()=>setStep(2)}>Modifica</button>
          </div>
          <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.6,marginBottom:"1.25rem",textAlign:"center"}}>Verifica o correggi i valori precompilati. La rendita catastale serve per il calcolo preciso dell’IMU — se non disponibile inserisci almeno il valore di mercato.</p>

          {(step===3||step===6) && (<>
            {omiSug && (
              <div className="info-box" style={{marginBottom:"1rem",fontSize:".82rem",lineHeight:1.6}}>
                📊 I valori qui sotto sono stimati dalle tabelle OMI ufficiali (AdE 2025) per la tua zona. Modificali se conosci i dati reali del tuo immobile.
              </div>
            )}
            <div className="fgrid">
              <div className="field">
                <label>Rendita catastale (€/anno) <span style={{fontWeight:400,color:"var(--muted)",fontSize:".65rem",textTransform:"none",letterSpacing:0}}>— opzionale</span></label>
                <input type="number" min="0" placeholder="" value={form.r} onChange={e=>fa("r",e.target.value)} />
                <span className="hint">Serve per il calcolo preciso dell'IMU. Puoi trovarla nella visura catastale.</span>
              </div>
              <div className="field">
                <label>Valore di mercato (€)</label>
                <input type="number" min="0" placeholder="" value={form.vi} onChange={e=>fa("vi",e.target.value)} />
                <span className="hint">Stimato dalle tabelle OMI — modificalo se conosci il valore reale.</span>
              </div>
              <div className="field">
                <label>Canone mensile desiderato (€) *</label>
                <input type="number" min="0" placeholder="" value={form.cm} onChange={e=>fa("cm",e.target.value)} />
                <span className="hint">Stimato dalle tabelle OMI — usato per lo scenario libero mercato.</span>
              </div>
              <div className="field">
                <label>Spese condominiali ordinarie (€/mese)</label>
                <input type="number" min="0" placeholder="" value={form.co} onChange={e=>fa("co",e.target.value)} />
                <span className="hint">Lascia vuoto per usare la stima automatica (€50/mese)</span>
              </div>
              <div className="field">
                <label>Manutenzione ordinaria (€/anno)</label>
                <input type="number" min="0" placeholder="" value={form.mn} onChange={e=>fa("mn",e.target.value)} />
                <span className="hint">Lascia vuoto per la stima automatica</span>
              </div>
            </div>
            {s3err && <div className="err">⚠️ {s3err}</div>}
            <div className="nav-btns"><button className="btn-back" onClick={()=>setStep(2)}>← Indietro</button><button className="btn-next" onClick={vaiStep4}>Continua →</button></div>
          </>)}
          {step===6 && (
            <button className="btn btn-gold" style={{marginTop:"1.25rem"}} onClick={calcRes}>↻ Ricalcola risultati</button>
          )}
        </div>
      )}

      {/* ─── STEP 4: CARATTERISTICHE ─── */}
      {(step===4||step===6) && (
        <div className="card">
          <div className="hero-icon"><div className="hero-icon-box">✨</div></div>
          <div className="question-title">Caratteristiche dell'immobile</div>
          <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.6,marginBottom:"1.25rem",textAlign:"center"}}>Seleziona gli elementi presenti secondo l’Allegato 4 dell’accordo territoriale. Determinano la sottofascia del canone concordato.</p>
          {step>4 && (
            <div className="zbar">
              <span>{attivi.length} elementi attivi · {sottofascia}ª sottofascia</span>
              {step<6 && <button className="rlink" onClick={()=>setStep(4)}>Modifica</button>}
            </div>
          )}
          {step===4 && (<>
            <div className="zbar">
              <span>Seleziona gli elementi presenti · <strong style={{color:"#1a5c2a"}}>② ④</strong> obbligatori già attivi</span>
            </div>
            <div className="pill-grid">
              {ELEMENTI.map(el=>{
                const isOn=attivi.includes(el.id);
                return(
                  <button key={el.id} className={`pill ${isOn?"on":""}`} title={el.desc} onClick={()=>togglePill(el.id)}>
                    <span className="pill-icon">{el.icon}</span>{el.label}
                    {el.obbl && <span style={{fontSize:".6rem",opacity:.7,marginLeft:2}}>●</span>}
                  </button>
                );
              })}
            </div>
            <div className="sf-box">
              <div className="sf-num">{sottofascia}ª</div>
              <div className="sf-label">
                <strong>
                  {sottofascia===1&&"Sottofascia bassa (1–2 elementi)"}
                  {sottofascia===2&&"Sottofascia media (3–8 elementi)"}
                  {sottofascia===3&&"Sottofascia alta (9+ elementi)"}
                </strong>
                {attivi.length} elementi attivi su 21 ·{" "}
                {fasciaCalc&&<span>Range: <strong>{fEur(fasciaCalc.canoneMin/12)}/mese – {fEur(fasciaCalc.canoneMax/12)}/mese</strong></span>}
              </div>
            </div>
            <div className="nav-btns"><button className="btn-back" onClick={()=>setStep(3)}>← Indietro</button><button className="btn-next" onClick={()=>setStep(5)}>Continua →</button></div>
          </>)}
        </div>
      )}

      {/* ─── STEP 5: MAGGIORAZIONI ─── */}
      {(step===5||step===6) && (
        <div className="card">
          <div className="hero-icon"><div className="hero-icon-box">📋</div></div>
          <div className="question-title">Maggiorazioni cumulative</div>
          <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.6,marginBottom:"1.25rem",textAlign:"center"}}>Indica se l’immobile è arredato e la durata del contratto concordato. Queste maggiorazioni si applicano al canone concordato secondo il Titolo A dell’accordo.</p>
          {step>5 && (
            <div className="zbar">
              <span>Arredo: {maggArredo==="no"?"Nessuno":maggArredo==="parziale"?"Parziale":"Completo"} · Durata: {maggDurata}+2 anni{fasciaCalc?` · Canone max: ${fEur(fasciaCalc.canoneMax/12)}/mese`:""}</span>
              {step<6 && <button className="rlink" onClick={()=>setStep(5)}>Modifica</button>}
            </div>
          )}
          <div className="sec-hdr">Arredo (Titolo A art. 3)</div>
          <div className="magg-grid">
            {[{v:"no",label:"Non arredato",sub:"Nessuna maggiorazione",perc:"+0%"},
              {v:"parziale",label:"Parz. arredato",sub:"Cucina + metà vani",perc:"+6%"},
              {v:"completo",label:"Completamente arredato",sub:"Tutti i vani con mobilio",perc:"+12%"}
            ].map(o=>(
              <button key={o.v} className={`magg-item ${maggArredo===o.v?"on":""}`} onClick={()=>setMaggArredo(o.v)}>
                <div className="mt">{o.label}</div><div className="ms">{o.sub}</div><div className="mp">{o.perc}</div>
              </button>
            ))}
          </div>
          <div className="sec-hdr" style={{marginTop:"1rem"}}>Durata contratto concordato (Titolo A art. 4)</div>
          <div className="magg-grid-4">
            {[{v:"3",label:"3+2",sub:"Standard",perc:"+0%"},
              {v:"4",label:"4+2",sub:"+2%",perc:"+2%"},
              {v:"5",label:"5+2",sub:"+4%",perc:"+4%"},
              {v:"6",label:"6+2",sub:"+6%",perc:"+6%"}
            ].map(o=>(
              <button key={o.v} className={`magg-item ${maggDurata===o.v?"on":""}`} onClick={()=>setMaggDurata(o.v)}>
                <div className="mt">{o.label}</div><div className="ms">{o.sub}</div><div className="mp">{o.perc}</div>
              </button>
            ))}
          </div>
          {fasciaCalc&&(maggArredo!=="no"||maggDurata!=="3")&&(
            <div style={{marginTop:"1rem",background:"#fff8e8",border:"1px solid #e8d08a",borderRadius:6,padding:".75rem 1rem",fontSize:".8rem",lineHeight:1.7}}>
              <strong>Maggiorazione totale: +{Math.round(fasciaCalc.totPerc*100)}%</strong>
              {fasciaCalc.percArredo>0&&<span> (arredo +{Math.round(fasciaCalc.percArredo*100)}%)</span>}
              {fasciaCalc.percDurata>0&&<span> + durata +{Math.round(fasciaCalc.percDurata*100)}%</span>}
              {fasciaCalc&&<span> → Canone max concordato: <strong>{fEur(fasciaCalc.canoneMax/12)}/mese</strong></span>}
            </div>
          )}
          {step===5&&(
            <div className="nav-btns"><button className="btn-back" onClick={()=>setStep(4)}>← Indietro</button><button className="btn-calcola" onClick={calcRes}>🔍 Confronta gli scenari</button></div>
          )}
        </div>
      )}

      {/* ─── STEP 6: RISULTATI ─── */}
      {step===6&&ris&&(<>
        <div ref={risRef}></div>
        <div className="card" style={{textAlign:"center",marginBottom:"1rem"}}>
          <div className="hero-icon"><div className="hero-icon-box">📊</div></div>
          <div className="question-title" style={{fontSize:"1.2rem"}}>I tuoi risultati</div>
          <div className="badge" style={{margin:"0 auto"}}>{addrShort&&<span>📍 {addrShort} · </span>}Zona <strong>{zona}</strong> · {mq} mq · {STATO_LABELS[stato]?.label}</div>
        </div>
        {ris.renditaStimata&&(
          <div style={{background:"#fdf0f2",border:"2px solid #f0b8c0",borderRadius:6,padding:"1rem 1.25rem",marginBottom:"1.5rem",lineHeight:1.6}}>
            <div style={{fontWeight:700,color:"var(--red)",marginBottom:".35rem",fontSize:".9rem"}}>⚠️ Il valore dell'IMU nei risultati potrebbe non essere preciso</div>
            <div style={{fontSize:".82rem",color:"var(--text)"}}>La rendita catastale non è stata inserita: è stata stimata dal valore di mercato (rendita stimata: <strong>{fEur(ris.renditaEff)}/anno</strong>). Per un calcolo esatto torna ai dati, inserisci la rendita dalla visura catastale e ricalcola.</div>
          </div>
        )}

        {/* REGIME FISCALE */}
        <div className="card" style={{marginBottom:"1rem"}}>
          <div style={{fontSize:".78rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",marginBottom:".6rem"}}>Regime fiscale</div>
          <div className="fiscal-tabs">
            <button className={`fiscal-tab ${fiscalTab==="ced"?"on":""}`} onClick={()=>setFiscalTab("ced")}>Cedolare secca</button>
            <button className={`fiscal-tab ${fiscalTab==="irpef"?"on":""}`} onClick={()=>setFiscalTab("irpef")}>IRPEF ordinaria</button>
          </div>
          <div className="fiscal-section">
            {fiscalTab==="ced"&&(
              <div style={{fontSize:".82rem",lineHeight:1.6}}>
                <strong>Cedolare secca:</strong> aliquota fissa · nessun aggiornamento ISTAT del canone.<br/>
                Concordato/ERS: 10% · Libero mercato: 21%
              </div>
            )}
            {fiscalTab==="irpef"&&(<>
              <div style={{fontSize:".82rem",marginBottom:".75rem",lineHeight:1.6}}>
                <strong>IRPEF ordinaria</strong> — base imponibile = canone × 95%.
                Con IRPEF è possibile aggiornare il canone +75% ISTAT/anno (non simulato).
                <br/><strong style={{color:"var(--red)"}}>IMU senza riduzione: con IRPEF non si applica il –25% IMU del canone concordato.</strong>
              </div>
              <div style={{fontSize:".75rem",fontWeight:700,marginBottom:".4rem",color:"var(--muted)"}}>Scaglione marginale IRPEF:</div>
              <div className="irpef-grid">
                {IRPEF_SCAGLIONI.map((s,i)=>(
                  <button key={i} style={{cursor:"pointer",border:irpefScag===i?"2px solid var(--navy)":"1px solid var(--border)",background:irpefScag===i?"var(--navy)":"var(--bg)",borderRadius:4,padding:".6rem .8rem",textAlign:"left"}}
                    onClick={()=>setIrpefScag(i)}>
                    <div style={{fontWeight:700,fontSize:".75rem",color:irpefScag===i?"#fff":"var(--navy)"}}>{s.label}</div>
                    <div style={{fontSize:".67rem",color:irpefScag===i?"rgba(255,255,255,.7)":"var(--muted)",marginTop:2}}>{s.desc}</div>
                  </button>
                ))}
              </div>
            </>)}
          </div>
        </div>

        {/* CARD SCENARI */}
        <div className="stitle">📊 Risultati per scenario</div>

        {/* ── RIGA SFITTA: card dati + scheda informativa ─────────────── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",marginBottom:"1rem"}}>
          {(()=>{const id="sfitta",sc=scenari.find(s=>s.id===id);return(
            <div className={`scard ${isBest(id,5)?"scard-best":""}`}>
              <div className="ch2">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span className="ctag t-s">Scenario A</span>
                  {isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                </div>
                <h3>{sc.titolo}</h3>
                <div className="sub">{sc.sub}</div>
              </div>
              <div className="cb">
                {periodi.map(p=>{const v=getV(id,p);return(
                  <div className="trow" key={p}>
                    <span className="tl">{p} {p===1?"anno":"anni"}</span>
                    <span className={`tv ${v<0?"neg":"pos"}`}>{fEur(v,true)}</span>
                  </div>
                );})}
              </div>
              <div className="cf">{`IMU: ${fEur(ris.imuOrd*1.1)}/anno · TARI: ${fEur(ris.tariSfitta)}/anno`}</div>
            </div>
          )})()}
          <div className="scheda scheda-sfitta">
            <span className="scheda-icon">⚠️</span>
            <div className="scheda-title">Un rischio crescente</div>
            <div className="scheda-msg">&ldquo;La casa sfitta non è neutra: è una passività.&rdquo;</div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>IMU maggiorata +10% ogni anno, interamente a tuo carico</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>TARI a carico del proprietario: zero entrate, costi certi</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Deterioramento accelerato senza manutenzione continuativa</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Rischio di occupazione abusiva e difficoltà di recupero</span></div>
            <div className="scheda-divider"></div>
            <div className="scheda-stat">
              <span className="scheda-stat-num">{fEur(getV("sfitta",5),true)}</span>
              perdita netta stimata a 5 anni
            </div>
          </div>
        </div>

        {/* ── RIGA ERS: card dati + scheda informativa ─────────────────── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",marginBottom:"2rem"}}>
          {(()=>{const id="ers",sc=scenari.find(s=>s.id===id);return(
            <div className={`scard ${isBest(id,5)?"scard-best":""}`}>
              <div className="ch2">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                  <span className="ctag t-e">Scenario B</span>
                  {isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                </div>
                <h3>{sc.titolo}</h3>
                <div className="sub">{sc.sub}</div>
              </div>
              <div className="cb">
                <div style={{fontSize:".72rem",background:"#fff3e0",border:"1px solid #f0c88a",borderRadius:3,padding:".4rem .6rem",marginBottom:".5rem",lineHeight:1.5}}>⚠️ <strong>Stima orientativa</strong> — canone ERS = concordato max –25%</div>
                {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);return(
                  <div className="trow" key={p}>
                    <span className="tl">{p} {p===1?"anno":"anni"}</span>
                    <span className={`tv ${b?"best":v<0?"neg":"pos"}`}>{fEur(v,true)}{b?" ★":""}</span>
                  </div>
                );})}
              </div>
              <div className="cf">{`Canone ERS: ${fEur(ris.canoneERS/12)}/mese (–25% su max concordato)`}</div>
            </div>
          )})()}
          <div className="scheda scheda-ers">
            <span className="scheda-icon">🤝</span>
            <div className="scheda-title">Stabile, protetto, conveniente</div>
            <div className="scheda-msg">&ldquo;Meno rischio, più stabilità. Una scelta che tutela anche te.&rdquo;</div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Cedolare secca al 10% e IMU ridotta del 25%</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Accesso al Fondo di Garanzia FILSE contro la morosità</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Microcredito convenzionato tramite l&apos;Agenzia Sociale per la Casa</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Accompagnamento nella gestione dell&apos;inquilino</span></div>
            <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Riduzione del rischio di morosità e turnover</span></div>
            <div className="scheda-divider"></div>
            <div className="scheda-stat">
              <span className="scheda-stat-num">{fEur(getV("ers",5),true)}</span>
              rendimento netto stimato a 5 anni
            </div>
            <div className="scheda-stat" style={{marginTop:".4rem"}}>
              <span className="scheda-stat-num">{fEur(getV("ers",5)-getV("sfitta",5),true)}</span>
              vantaggio rispetto alla casa sfitta
            </div>
          </div>
        </div>

        {/* ── ALTRE SOLUZIONI ───────────────────────────────────────────── */}
        <div style={{marginBottom:"2rem"}}>
          <button onClick={()=>setMostraAltri(v=>!v)}
            className="btn-outline" style={{width:"100%",justifyContent:"space-between",display:"flex",alignItems:"center",gap:8}}>
            <span>📋 Altre soluzioni: Canone concordato 3+2 e Libero mercato 4+4</span>
            <span style={{fontSize:".7rem"}}>{mostraAltri?"▲ Nascondi":"▼ Mostra"}</span>
          </button>
          {mostraAltri&&(
            <div style={{marginTop:"1rem"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",marginBottom:"1.5rem"}}>
                {["conc","lib"].map(id=>{const sc=scenari.find(s=>s.id===id);return(
                  <div className={`scard ${isBest(id,5)?"scard-best":""}`} key={id}>
                    <div className="ch2">
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                        <span className={`ctag ${sc.tag}`}>{sc.n}</span>
                        {isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                      </div>
                      <h3>{sc.titolo}</h3>
                      <div className="sub">{sc.sub}</div>
                    </div>
                    <div className="cb">
                      {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);
                        let dl=null;
                        if(fiscalTab==="irpef"){const vCed=ris[id][p].netto,diff=v-vCed;if(Math.abs(diff)>50)dl=<span className={`delta-badge ${diff>0?"delta-pos":"delta-neg"}`}>{fEur(diff,true)} vs ced.</span>;}
                        return(
                        <div className="trow" key={p}>
                          <span className="tl">{p} {p===1?"anno":"anni"}</span>
                          <span>
                            <span className={`tv ${b?"best":v<0?"neg":"pos"}`}>{fEur(v,true)}{b?" ★":""}</span>
                            {dl&&<span style={{marginLeft:6}}>{dl}</span>}
                          </span>
                        </div>
                      );})}
                    </div>
                    <div className="cf">
                      {id==="conc"&&fiscalTab==="ced"&&`Canone: ${fEur(ris.cConc/12)}/mese · Ced.10% · IMU: ${fEur(ris.imuConc)}/anno`}
                      {id==="conc"&&fiscalTab==="irpef"&&`Canone: ${fEur(ris.cConc/12)}/mese · IRPEF ${Math.round(IRPEF_SCAGLIONI[irpefScag].aliq*100)}% · IMU: ${fEur(ris.imuOrd)}/anno`}
                      {id==="lib"&&fiscalTab==="ced"&&`Canone: ${fEur(ris.canoneAnnuo/12)}/mese · Ced.21% · IMU: ${fEur(ris.imuOrd)}/anno`}
                      {id==="lib"&&fiscalTab==="irpef"&&`Canone: ${fEur(ris.canoneAnnuo/12)}/mese · IRPEF ${Math.round(IRPEF_SCAGLIONI[irpefScag].aliq*100)}% su 95%`}
                    </div>
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>

        {/* ── ANALISI APPROFONDITA (tabella + grafico) ─────────────────── */}
        <div style={{marginBottom:"2rem"}}>
          <button onClick={()=>setMostraAnalisi(v=>!v)}
            style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"1.5px solid var(--border)",borderRadius:4,padding:".65rem 1.1rem",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:".83rem",fontWeight:600,color:"var(--navy)",width:"100%",justifyContent:"space-between"}}>
            <span>📊 Analisi comparativa dettagliata — tabella e grafico</span>
            <span style={{fontSize:".7rem"}}>{mostraAnalisi?"▲ Nascondi":"▼ Mostra"}</span>
          </button>
          {mostraAnalisi&&(
            <div style={{marginTop:"1rem"}}>
              {/* TABELLA */}
              <div className="stitle" style={{marginTop:0}}>Tabella comparativa</div>
              <div className="twrap" style={{marginBottom:"1.5rem"}}>
                <table>
                  <thead><tr><th>Scenario</th><th>1 anno</th><th>3 anni</th><th>5 anni</th></tr></thead>
                  <tbody>
                    {[{id:"sfitta",l:"🏚️ Casa sfitta"},{id:"ers",l:"🏛️ Canone moderato ERS"},
                      {id:"conc",l:"🤝 Canone concordato 3+2"},{id:"lib",l:"🏘️ Libero mercato 4+4"}].map(({id,l})=>(
                      <tr key={id}>
                        <td>{l}
                          {id==="ers"&&<span className="sub-row">⚠️ stima orientativa</span>}
                          {id==="conc"&&fiscalTab==="irpef"&&<span className="sub-row">IMU senza riduzione 25%</span>}
                        </td>
                        {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);return(
                          <td key={p} className={b?"best":v<0?"worst":""}>{fEur(v,true)}{b?" ★":""}</td>
                        );})}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* GRAFICO */}
              <div className="stitle">Visualizzazione grafica</div>
              <div className="pbtn">
                {periodi.map(p=><button key={p} className={periodo===p?"a":""} onClick={()=>setPeriodo(p)}>{p} {p===1?"anno":"anni"}</button>)}
              </div>
              {[{id:"conc",l:"🤝 Canone concordato",c:"bf-c"},{id:"lib",l:"🏘️ Libero mercato",c:"bf-l"},{id:"ers",l:"🏛️ ERS/moderato ⚠️",c:"bf-e"}].map(({id,l,c})=>{
                const v=getV(id,periodo);
                return(<div className="bg" key={id}><div className="bg-label">{l}</div><div className="bt"><div className={`bf ${c}`} style={{width:bw(v)+"%"}}>{fEur(v,true)}</div></div></div>);
              })}
              <div style={{borderTop:"1px dashed var(--border)",marginTop:".75rem",paddingTop:"1rem"}}>
                <div className="bg-label" style={{color:"var(--red)"}}>🏚️ Casa sfitta — costo annuo (valore negativo)</div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginTop:".35rem"}}>
                  <div style={{background:"var(--bg2)",borderRadius:3,height:34,flex:1,overflow:"hidden"}}>
                    <div className="bf bf-s" style={{width:bw(getV("sfitta",periodo))+"%"}}>{fEur(getV("sfitta",periodo),true)}</div>
                  </div>
                </div>
                <div style={{fontSize:".72rem",color:"var(--muted)",marginTop:".3rem"}}>Rappresenta un costo netto — non confrontabile direttamente con gli scenari di affitto</div>
              </div>
            </div>
          )}
        </div>

        {/* NOTE */}
        <div className="note" style={{marginTop:"2rem",marginBottom:"1.5rem"}}>
          <strong>Note metodologiche:</strong>
          <ul>
            <li><strong>Zona {zona}:</strong> fascia {fEur(zd?.min||0)}/mq/anno – {fEur(zd?.max||0)}/mq/anno · Allegato 2, Accordo Territoriale Genova 29/05/2025 (in vigore dal 16/06/2025)</li>
            <li><strong>Stato conservativo:</strong> {STATO_LABELS[stato].label} — usato per calibrare i suggerimenti OMI (non influisce sul canone concordato)</li>
            <li><strong>Zona rilevata:</strong> point-in-polygon sui poligoni OMI ufficiali del Comune di Genova (EPSG:4326)</li>
            <li><strong>IMU 2026 Genova:</strong> ordinaria 1,06% · canone concordato con inquilino residente –25% (DCC 57/2024 + DCC 41/2025)</li>
            <li><strong>Cedolare secca:</strong> 21% libero mercato · 10% canone concordato/ERS · nessun aggiornamento ISTAT</li>
            <li><strong>IRPEF ordinaria:</strong> base imponibile = canone × 95% · con IRPEF possibile aggiornamento +75% ISTAT/anno (non simulato)</li>
            <li><strong>Canone ERS/moderato:</strong> stima –25% su concordato max · il valore reale dipende dalla convenzione specifica Comune/ARTE</li>
            <li><strong>TARI:</strong> calcolata su {mq} mq, tariffa 1 componente (DCC 60/2024) · casa sfitta a carico proprietario · affittata a carico inquilino</li>
            <li><strong>Quotazioni OMI:</strong> AdE 2° semestre 2025 · abitazioni civili stato normale · riferimento orientativo, non perizia</li>
            <li><strong>Non inclusi:</strong> costi registrazione, spese legali, aggiornamento ISTAT con IRPEF, bonus ristrutturazione</li>
          </ul>
        </div>
        <div className="print-header">
          <div style={{fontSize:"1.4rem",fontWeight:700,color:"#0f1e2e"}}>
            Comparatore scenari di locazione — Genova
          </div>
          <div style={{fontSize:".85rem",color:"#666",marginTop:4}}>
            Zona <strong>{zona}</strong>{OMI_DESC[zona]?` – ${OMI_DESC[zona]}`:""} · {mq} mq · Accordo Territoriale 29/05/2025
          </div>
          <div style={{fontSize:".8rem",color:"#666",marginTop:2}}>
            Regime fiscale: {fiscalTab==="ced"?"Cedolare secca":`IRPEF ${Math.round(IRPEF_SCAGLIONI[irpefScag].aliq*100)}% scaglione marginale`}
          </div>
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:"1.5rem"}}>
          <button className="btn-back" onClick={reset}>🔄 Nuova simulazione</button>
          <button className="btn-next" onClick={()=>window.print()}>🖨️ Stampa / Salva PDF</button>
        </div>
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
