<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulatore Locazione Genova 2025</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --yellow:#f5f56a;--navy:#1e2d5a;--navy2:#162247;
      --blue-btn:#ccddf5;--blue-border:#5588cc;
      --green:#2d7a4a;--green-bg:#d4f0e0;
      --red:#c0392b;--red-bg:#fde8e6;
      --amber:#d97706;--amber-bg:#fef3c7;
      --muted:#5a6a8a;--border:#b8c8e0;
      --sidebar-w:200px;
    }
    body{font-family:'Inter','Segoe UI',sans-serif;background:var(--yellow);color:var(--navy);min-height:100vh;-webkit-font-smoothing:antialiased}
    #root{display:flex;min-height:100vh}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:var(--navy);min-height:100vh;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:1.75rem 1rem 2rem;z-index:10}
    .sidebar-logo{width:90px;height:90px;border-radius:50%;background:#6677aa;margin-bottom:2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
    .sidebar-steps{width:100%;display:flex;flex-direction:column;position:relative;gap:0}
    .sidebar-steps::before{content:'';position:absolute;left:21px;top:28px;bottom:28px;width:2px;border-left:2px dashed rgba(255,255,255,0.2)}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:7px 0;position:relative;z-index:1}
    .sidebar-bullet{width:44px;height:44px;border-radius:8px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;color:var(--navy);flex-shrink:0;transition:all 0.2s}
    .sidebar-bullet.inactive{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font-size:.85rem}
    .sidebar-bullet.done{background:var(--green);color:white;font-size:.9rem}
    .sidebar-label{font-size:.72rem;font-weight:600;color:rgba(255,255,255,0.9);line-height:1.3}
    .sidebar-label.inactive{color:rgba(255,255,255,0.3)}
    .sidebar-label.done{color:rgba(255,255,255,0.55)}

    /* MAIN */
    .main{margin-left:var(--sidebar-w);flex:1;padding:2rem 2.5rem 4rem;max-width:960px}
    .main-centered{margin-left:0;max-width:100%;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}

    /* HEADER BOX */
    .page-header{background:var(--navy);border-radius:18px;padding:1.5rem 2rem;margin-bottom:1.75rem;color:white}
    .page-header h1{font-size:1.6rem;font-weight:800;text-align:center;line-height:1.2}
    .page-header h2{font-size:1.2rem;font-weight:700;text-align:center;line-height:1.3}
    .page-header p{font-size:.88rem;text-align:center;color:rgba(255,255,255,.8);margin-top:.5rem;line-height:1.6}

    /* CONTENT BOX */
    .content-box{background:var(--navy);border-radius:18px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:white}
    .content-box p{font-size:.88rem;text-align:center;color:rgba(255,255,255,.85);line-height:1.65}
    .content-box p.bold{font-weight:700;font-size:1rem;color:white;margin-bottom:.5rem}

    /* INPUTS */
    .ainput{width:100%;padding:.9rem 1.1rem;font-size:1rem;font-weight:500;font-family:'Inter',sans-serif;border:2px solid var(--navy);border-radius:12px;background:white;color:var(--navy);outline:none;transition:border-color .2s,box-shadow .2s}
    .ainput:focus{border-color:var(--blue-border);box-shadow:0 0 0 3px rgba(85,136,204,.15)}
    .field{display:flex;flex-direction:column}
    .field label{font-size:.82rem;font-weight:700;color:var(--navy);margin-bottom:.4rem}
    .field input,.field select{border:2px solid var(--navy);border-radius:10px;padding:.7rem .9rem;font-family:'Inter',sans-serif;font-size:.92rem;color:var(--navy);background:white;outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus,.field select:focus{border-color:var(--blue-border);box-shadow:0 0 0 3px rgba(85,136,204,.15)}
    .field .hint{font-size:.7rem;color:var(--muted);margin-top:.3rem}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;margin-bottom:1.25rem}

    /* BUTTONS */
    .btn-start{display:block;width:100%;max-width:360px;margin:0 auto;padding:1.1rem 2rem;background:var(--blue-btn);border:2px solid var(--blue-border);border-radius:14px;font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:800;color:var(--navy);cursor:pointer;transition:all .2s;text-align:center;letter-spacing:.02em}
    .btn-start:hover{background:#b8ccee;transform:translateY(-1px)}
    .btn-cerca{padding:.9rem 2rem;background:var(--blue-btn);border:2px solid var(--blue-border);border-radius:12px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:var(--navy);cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-cerca:hover{background:#b8ccee}
    .btn-cerca:disabled{opacity:.5;cursor:not-allowed}
    .btn-nav{padding:.85rem 2rem;background:var(--blue-btn);border:2px solid var(--blue-border);border-radius:12px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:var(--navy);cursor:pointer;transition:all .2s}
    .btn-nav:hover{background:#b8ccee}
    .btn-calcola{padding:1rem 2.5rem;background:var(--navy);border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:800;color:white;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(30,45,90,.25)}
    .btn-calcola:hover{background:var(--navy2);transform:translateY(-1px)}
    .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;gap:1rem}

    /* FIELD LABELS & SEPARATORS */
    .field-label{font-size:.9rem;font-weight:700;color:var(--navy);margin-bottom:.5rem;display:block}
    .field-sep{width:100%;height:2px;background:var(--navy);opacity:.15;margin-bottom:1rem}

    /* OPTION CARDS */
    .opt-grid{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .opt-card{flex:1;min-width:110px;background:var(--navy);border:2px solid var(--navy);border-radius:14px;padding:1rem .75rem;text-align:center;cursor:pointer;transition:all .2s;color:white}
    .opt-card:hover{background:#2a3f7a}
    .opt-card.sel{background:var(--blue-btn);border-color:var(--blue-border);color:var(--navy)}
    .opt-icon{font-size:1.6rem;margin-bottom:.4rem}
    .opt-title{font-size:.9rem;font-weight:700}
    .opt-sub{font-size:.72rem;opacity:.75;margin-top:.2rem}
    .opt-perc{font-size:.85rem;font-weight:700;margin-top:.35rem;color:#fbbf24}
    .opt-card.sel .opt-perc{color:var(--green)}

    /* PILLS */
    .pill-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:.5rem .9rem;border:2px solid var(--navy);border-radius:60px;background:white;cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;color:var(--navy);transition:all .18s;user-select:none}
    .pill:hover{background:var(--blue-btn)}
    .pill.on{background:var(--navy);color:white}

    /* ZONE GRID */
    .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:1rem;max-height:320px;overflow-y:auto}
    .zbtn{padding:.5rem;border:2px solid var(--navy);border-radius:8px;background:white;cursor:pointer;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;color:var(--navy);transition:all .15s;text-align:center}
    .zbtn:hover{background:var(--blue-btn)}
    .zbtn.sel{background:var(--navy);color:white}
    .zbtn .zr{font-size:.6rem;font-weight:400;opacity:.7;display:block;margin-top:2px}

    /* GEO RESULT */
    .geo-result{background:var(--navy);color:white;border-radius:16px;padding:1.5rem 2rem;margin-top:1.25rem;text-align:center}
    .geo-result h3{font-size:1.2rem;font-weight:700;color:var(--yellow);margin-bottom:.4rem}
    .zona-code{font-size:2.2rem;font-weight:800;color:white}
    .zona-sub{font-size:.85rem;color:rgba(255,255,255,.7);margin-top:.35rem}
    .geo-method{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;font-weight:700;margin-left:6px}
    .geo-exact{background:var(--green-bg);color:var(--green)}
    .geo-approx{background:var(--amber-bg);color:var(--amber)}

    /* ZBAR */
    .zbar{background:white;border:2px solid var(--navy);border-radius:10px;padding:.65rem 1rem;margin-bottom:1rem;font-size:.82rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;color:var(--navy)}
    .rlink{font-size:.78rem;color:var(--navy);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;font-weight:600}

    /* SF BOX */
    .sf-box{background:var(--navy);color:white;border-radius:14px;padding:1rem 1.25rem;margin:1rem 0;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
    .sf-num{font-size:2.2rem;font-weight:800;color:var(--yellow)}
    .sf-label{font-size:.85rem;color:rgba(255,255,255,.85);line-height:1.6}
    .sf-label strong{color:var(--yellow);display:block;font-size:1rem;margin-bottom:2px}

    /* MAGG */
    .magg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:1rem}
    .magg-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
    .magg-item{background:var(--navy);border:2px solid var(--navy);border-radius:12px;padding:.85rem 1rem;cursor:pointer;transition:all .18s;text-align:left;color:white}
    .magg-item:hover{background:#2a3f7a}
    .magg-item.on{background:var(--blue-btn);border-color:var(--blue-border);color:var(--navy)}
    .magg-item .mt{font-size:.85rem;font-weight:700}
    .magg-item .ms{font-size:.7rem;opacity:.75;margin-top:2px}
    .magg-item .mp{font-size:1rem;font-weight:800;color:#fbbf24;margin-top:5px}
    .magg-item.on .mp{color:var(--green)}
    .sec-hdr{font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin:1.25rem 0 .6rem;padding-bottom:.4rem;border-bottom:2px solid rgba(30,45,90,.2)}

    /* MESSAGES */
    .err{background:var(--red-bg);border-left:4px solid var(--red);border-radius:10px;padding:.75rem 1rem;font-size:.85rem;font-weight:600;color:var(--red);margin-top:.75rem}
    .warn{background:var(--amber-bg);border-left:4px solid var(--amber);border-radius:10px;padding:.75rem 1rem;font-size:.83rem;margin-top:.75rem;line-height:1.6;color:var(--navy)}
    .info-box{background:white;border:2px solid var(--navy);border-radius:10px;padding:.75rem 1.25rem;font-size:.83rem;margin-top:.75rem;line-height:1.6;color:var(--navy)}
    .loading{color:var(--muted);font-size:.85rem;margin-top:.5rem;display:flex;align-items:center;gap:8px}

    /* RESULTS */
    .results-header{background:var(--navy);color:white;border-radius:18px;padding:1.5rem 2rem;text-align:center;margin-bottom:1.5rem}
    .results-header h1{font-size:1.8rem;font-weight:800;color:var(--yellow)}
    .results-header .sub{font-size:.88rem;color:rgba(255,255,255,.75);margin-top:.4rem}
    .stitle{font-size:1.1rem;font-weight:800;color:var(--navy);margin-bottom:1rem;display:flex;align-items:center;gap:8px;padding-bottom:.5rem;border-bottom:2px solid rgba(30,45,90,.15)}

    /* FISCAL */
    .fiscal-tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .fiscal-tab{flex:1;padding:.75rem 1rem;border:2px solid var(--navy);background:white;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;color:var(--navy)}
    .fiscal-tab.on{background:var(--navy);border-color:var(--navy);color:white}
    .fiscal-section{background:white;border:2px solid var(--navy);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem}
    .irpef-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.5rem}

    /* SCENARIO CARDS */
    .scenario-block{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:2.5rem}
    .scard{background:white;border:2px solid var(--navy);border-radius:18px;overflow:hidden;transition:transform .2s,box-shadow .2s}
    .scard:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(30,45,90,.15)}
    .scard-best{border-color:var(--amber);box-shadow:0 4px 16px rgba(217,119,6,.2)}
    .ch2{padding:1.1rem 1.3rem .9rem;background:var(--navy)}
    .scard-best .ch2{background:linear-gradient(135deg,#1e2d5a,#2d4a9a)}
    .ch2 h3{font-size:1.05rem;font-weight:700;color:white;margin-bottom:.25rem}
    .ch2 .sub{font-size:.72rem;color:rgba(255,255,255,.65);line-height:1.4}
    .ctag{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .65rem;border-radius:20px;display:inline-block;margin-bottom:.5rem}
    .t-s{background:#fee2e2;color:#c0392b}.t-c{background:var(--blue-btn);color:var(--navy)}
    .t-l{background:var(--green-bg);color:var(--green)}.t-e{background:var(--amber-bg);color:var(--amber)}
    .best-badge{display:inline-block;background:var(--amber);color:white;font-size:.6rem;font-weight:800;padding:.2rem .65rem;border-radius:20px;margin-left:6px;vertical-align:middle}
    .cb{padding:1rem 1.3rem;background:white}
    .trow{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(30,45,90,.08)}
    .trow:last-child{border-bottom:none}
    .tl{font-size:.8rem;color:var(--muted);font-weight:500}
    .tv{font-size:1rem;font-weight:800}
    .tv-small{font-size:.8rem;font-weight:600;color:var(--muted)}
    .pos{color:var(--green)}.neg{color:var(--red)}.best{color:var(--green)}.worst{color:var(--red)}
    .cf{padding:.65rem 1.3rem;background:rgba(30,45,90,.04);font-size:.71rem;color:var(--muted);line-height:1.5}

    /* SCHEDE */
    .scheda{border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;gap:.4rem}
    .scheda-sfitta{background:#fff1f2;border:2px solid #fda4af}
    .scheda-ers{background:#f0fdf4;border:2px solid #86efac}
    .scheda-icon{font-size:1.6rem;line-height:1;margin-bottom:.1rem}
    .scheda-title{font-size:1rem;font-weight:700;line-height:1.25;margin-bottom:.2rem}
    .scheda-sfitta .scheda-title{color:#881337}.scheda-ers .scheda-title{color:#14532d}
    .scheda-msg{font-size:.73rem;font-weight:600;font-style:italic;line-height:1.45;padding:.45rem .6rem;border-radius:8px;margin-bottom:.3rem}
    .scheda-sfitta .scheda-msg{background:#ffe4e6;color:#881337;border-left:3px solid #f43f5e}
    .scheda-ers .scheda-msg{background:#dcfce7;color:#14532d;border-left:3px solid #22c55e}
    .scheda-item{display:flex;gap:.4rem;font-size:.72rem;line-height:1.4;color:#1f2937;align-items:flex-start}
    .scheda-bullet{flex-shrink:0;font-size:.6rem;margin-top:.25rem;opacity:.5}
    .scheda-divider{height:1px;margin:.4rem 0}
    .scheda-sfitta .scheda-divider{background:#fecdd3}.scheda-ers .scheda-divider{background:#bbf7d0}
    .scheda-stat{padding:.5rem .65rem;border-radius:8px;font-size:.7rem;font-weight:500;line-height:1.3}
    .scheda-sfitta .scheda-stat{background:#ffe4e6;color:#881337}
    .scheda-ers .scheda-stat{background:#dcfce7;color:#14532d}
    .scheda-stat-num{font-size:1.3rem;font-weight:800;display:block;line-height:1.1;margin-bottom:.1rem}

    /* CHART */
    .pbtn{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
    .pbtn button{padding:.5rem 1.1rem;border:2px solid var(--navy);border-radius:8px;background:white;color:var(--navy);cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;transition:all .15s}
    .pbtn button.a{background:var(--navy);color:white}
    .bg{margin-bottom:1rem}.bg-label{font-size:.78rem;font-weight:600;color:var(--navy);margin-bottom:.35rem}
    .bt{background:rgba(30,45,90,.12);border-radius:8px;height:38px;overflow:hidden}
    .bf{height:100%;border-radius:8px;display:flex;align-items:center;padding:0 14px;font-size:.78rem;font-weight:700;color:white;min-width:90px;transition:width .6s ease}
    .bf-s{background:linear-gradient(90deg,#9b2335,#c74455)}
    .bf-c{background:linear-gradient(90deg,#1e2d5a,#3058c9)}
    .bf-l{background:linear-gradient(90deg,#1a5c2a,#2d8b45)}
    .bf-e{background:linear-gradient(90deg,#8b4f00,#c97a00)}

    /* TABLE */
    .twrap{background:white;border:2px solid var(--navy);border-radius:14px;overflow:hidden;margin-bottom:2rem;overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:580px}
    thead tr{background:var(--navy)}
    thead th{padding:.85rem 1.1rem;text-align:left;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.75)}
    thead th:first-child{color:white}
    tbody tr{border-bottom:1px solid rgba(30,45,90,.1)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:nth-child(even){background:rgba(30,45,90,.03)}
    tbody td{padding:.75rem 1.1rem;font-size:.82rem;color:var(--navy)}
    tbody td:first-child{font-weight:700}
    .sub-row{font-size:.72rem;color:var(--muted);display:block}
    td.best{color:var(--green);font-weight:800}td.worst{color:var(--red)}

    /* MISC */
    .delta-badge{display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:.7rem;font-weight:700}
    .delta-pos{background:var(--green-bg);color:var(--green)}.delta-neg{background:var(--red-bg);color:var(--red)}
    .note{background:white;border:2px solid rgba(30,45,90,.2);border-radius:14px;padding:1.25rem 1.5rem;font-size:.79rem;color:var(--muted);line-height:1.75;margin-top:1.5rem}
    .note ul{padding-left:1.1rem}.note li{margin-bottom:.35rem}.note strong{color:var(--navy)}
    .print-header{display:none}

    @media(max-width:700px){
      .sidebar{display:none}.main{margin-left:0;padding:1.25rem 1rem 3rem}
      .scenario-block{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}
      .magg-grid-4{grid-template-columns:repeat(2,1fr)}.irpef-grid{grid-template-columns:1fr}
      .opt-grid{flex-direction:column}
    }
    @media print{
      .sidebar,.nav-row,.fiscal-tabs,.pbtn,.btn-calcola,.btn-nav,.btn-cerca{display:none!important}
      .main{margin-left:0}.print-header{display:block!important;margin-bottom:14px;border-bottom:2px solid var(--navy);padding-bottom:10px}
      body{background:white}@page{margin:1.2cm;size:A4}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="./data.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;



const { useState, useMemo, useEffect, useRef } = React;

const ELEMENTI = [
  {id:2,  icon:"🔥", label:"Riscaldamento",              desc:"Centralizzato, autonomo, piastre radianti o pompa di calore", obbl:true},
  {id:4,  icon:"🚿", label:"Bagno con doccia/vasca",     desc:"Servizio igienico completo con doccia o vasca", obbl:true},
  {id:1,  icon:"🛗", label:"Ascensore",                  desc:"Presente (sempre sì se piano ≤1°)"},
  {id:3,  icon:"❄️", label:"Raffrescamento",              desc:"Impianto di raffrescamento"},
  {id:5,  icon:"🌿", label:"Balcone/terrazzo",            desc:"Profondità ≥80cm e superficie ≥10mq, o giardino pertinenziale"},
  {id:6,  icon:"🛁", label:"Doppi servizi",               desc:"Due o più servizi igienici"},
  {id:7,  icon:"🪟", label:"Doppi vetri / blindata",      desc:"Doppi vetri ≥90% finestre e/o porta blindata"},
  {id:8,  icon:"📦", label:"Cantina / soffitta",          desc:"Cantina e/o soffitta pertinenziale"},
  {id:9,  icon:"🏢", label:"Portineria",                  desc:"Servizio di portineria attivo"},
  {id:10, icon:"🌳", label:"Area verde comune",           desc:"Verde ≥ triplo della superficie coperta, o impianto sportivo"},
  {id:11, icon:"♿", label:"Barriere architettoniche",    desc:"Strutture/interventi per superamento barriere nel condominio"},

function calcolaSottofascia(attivi) {
  const n = attivi.length;
  if (n >= 9) return 3;
  if (n >= 3) return 2;
  return 1;
}

function canoneConFascia(zd, mq, sottofascia, maggArredo, maggDurata) {
  const ampiezza = zd.max - zd.min;
  const terzo = ampiezza / 3;
  const sfMin = zd.min + (sottofascia - 1) * terzo;
  const sfMax = zd.min + sottofascia * terzo;
  const base = sfMax * mq;
  const percArredo = maggArredo === "completo" ? 0.12 : maggArredo === "parziale" ? 0.06 : 0;
  const percDurata = maggDurata === "4" ? 0.02 : maggDurata === "5" ? 0.04 : maggDurata === "6" ? 0.06 : 0;
  const totPerc = percArredo + percDurata;
  return { sfMin:sfMin*mq, sfMax:sfMax*mq, canoneMin:sfMin*mq*(1+totPerc), canoneMax:base*(1+totPerc), percArredo, percDurata, totPerc };
}

const OMI_STATO = { ottimo: 0.95, normale: 0.75, lavori: 1.10 };
// ottimo = 90% del max, normale = media min/max, lavori = 110% del min
function omiSuggerimenti(zona, mq, stato) {
  const ov = OMI_VALORI[zona];
  if (!ov || !mq) return null;
  let aqUnit, lcUnit;
  // Stime conservative (al ribasso rispetto ai valori OMI ufficiali)
  if (stato === "ottimo")  { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.50; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.50; }
  if (stato === "normale") { aqUnit = ov.aq_min + (ov.aq_max - ov.aq_min) * 0.25; lcUnit = ov.lc_min + (ov.lc_max - ov.lc_min) * 0.25; }
  if (stato === "lavori")  { aqUnit = ov.aq_min; lcUnit = ov.lc_min; }
  return {
    vi: Math.round(aqUnit * mq),
    cm: Math.round(lcUnit * mq),
    aqUnit: Math.round(aqUnit),
    lcUnit: lcUnit.toFixed(1),
  };
}

async function geocode(address) {
  const q = encodeURIComponent(address + ", Genova, Liguria, Italia");
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=it&addressdetails=1&accept-language=it`;
  const res = await fetch(url, { headers:{"Accept-Language":"it","User-Agent":"ComparatoreLocazioneGenova/1.0"} });
  if (!res.ok) throw new Error("Errore geocoding");
  const data = await res.json();
  if (!data.length) throw new Error("Indirizzo non trovato");
  return data[0];
}

const IMU_ORD=0.0106, IMU_MOLT=160, IMU_RIVAL=1.05, IMU_RID_CONC=0.25;
const CED_LIB=0.21, CED_CONC=0.10, ARTE_SCONTO=0.25, IRPEF_DED=0.05, TEFA=0.03;
const TARI_TAB=[[0.927,89.68],[1.098,209.26],[1.226,216.73],[1.333,230.19],[1.439,260.08],[1.514,279.51]];
function calcolaTari(mq) { const [f,v]=TARI_TAB[0]; return (f*mq+v)*(1+TEFA); }
const IRPEF_SCAGLIONI=[
  {label:"23% (fino €28.000)",aliq:0.23,desc:"Reddito complessivo ≤ €28.000"},
  {label:"35% (€28–50k)",     aliq:0.35,desc:"Reddito complessivo €28.001–€50.000"},

function fEur(v,sign=false){
  const f=new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Math.abs(v||0));
  if(sign) return (v>=0?"+":"-")+" "+f;
  return (v<0?"-":" ")+f;
}

function calcola({rendita,valoreImmobile,mq,zona,canoneAnnuo,canoneConc,condoMese,manuAnno}){
  const renditaStimata = rendita<=0;
  const renditaEff = rendita>0 ? rendita : valoreImmobile/(IMU_RIVAL*IMU_MOLT);
  const imuOrd  = renditaEff*IMU_RIVAL*IMU_MOLT*IMU_ORD;
  const imuConc = imuOrd*(1-IMU_RID_CONC);
  const man  = manuAnno>0  ? manuAnno  : (valoreImmobile>0 ? valoreImmobile*0.005 : mq*3);
  const condo= condoMese>0 ? condoMese*12 : 600;
  const ass=250, tariSfitta=calcolaTari(mq);
  const costiBase=ass+condo+man;
  const zd=ZT[zona]||{min:0,max:0};
  const cConc=canoneConc||(zd.max*mq);
  const canoneERS=zd.max*mq*(1-ARTE_SCONTO);
  const sfittaCed=n=>-(imuOrd*1.1+tariSfitta+costiBase)*n;
  const concCed =n=>{const c=cConc,ced=c*CED_CONC;return{netto:(c-ced-imuConc-costiBase)*n,c,ced};};
  const libCed  =n=>{const c=canoneAnnuo,ced=c*CED_LIB;return{netto:(c-ced-imuOrd-costiBase)*n,c,ced};};
  const ersCed  =n=>{const c=canoneERS,ced=c*CED_CONC;return{netto:(c-ced-imuConc-costiBase)*n,c,ced};};
  const irpefN=(canone,aliq,imu,n)=>{const base=canone*(1-IRPEF_DED);return(canone-base*aliq-imu-costiBase)*n;};
  const concIrpef=IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(cConc,aliq,imuOrd,1),n3:irpefN(cConc,aliq,imuOrd,3),n5:irpefN(cConc,aliq,imuOrd,5)}));
  const libIrpef =IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(canoneAnnuo,aliq,imuOrd,1),n3:irpefN(canoneAnnuo,aliq,imuOrd,3),n5:irpefN(canoneAnnuo,aliq,imuOrd,5)}));
  const ersIrpef =IRPEF_SCAGLIONI.map(({aliq})=>({n1:irpefN(canoneERS,aliq,imuOrd,1),n3:irpefN(canoneERS,aliq,imuOrd,3),n5:irpefN(canoneERS,aliq,imuOrd,5)}));
  return{
    sfitta:{1:sfittaCed(1),3:sfittaCed(3),5:sfittaCed(5)},
    conc:{1:concCed(1),3:concCed(3),5:concCed(5),cUsato:cConc},
    lib:{1:libCed(1),3:libCed(3),5:libCed(5)},
    ers:{1:ersCed(1),3:ersCed(3),5:ersCed(5),cMese:canoneERS/12},
    concIrpef,libIrpef,ersIrpef,
    imuOrd,imuConc,costiBase,cConc,canoneAnnuo,canoneERS,tariSfitta,renditaEff,renditaStimata,
  };
}

    const zd=zona?ZT[zona]:null,m=parseFloat(mq);
    if(!zd||isNaN(m)||m<=0) return null;
    return canoneConFascia(zd,m,sottofascia,maggArredo,maggDurata);
  },[zona,mq,sottofascia,maggArredo,maggDurata]);
  const omiSug=useMemo(()=>omiSuggerimenti(zona,parseFloat(mq),stato),[zona,mq,stato]);

  useEffect(()=>{
    if(step>=1&&step<=5) window.scrollTo({top:0,behavior:"smooth"});
    if(step===6&&risRef.current) risRef.current.scrollIntoView({behavior:"smooth",block:"start"});
  },[step]);

  const cerca=async()=>{
    if(!addr.trim()) return;
    setLoading(true);setGeoErr("");setGeoResult(null);setZona(null);setGeoMethod(null);
    try{
      const r=await geocode(addr);setGeoResult(r);
      const lat=parseFloat(r.lat),lon=parseFloat(r.lon);
      let found=null;
      if(typeof ZONE_POLIGONI!=="undefined"){
        for(const [z,polys] of Object.entries(ZONE_POLIGONI)){
          for(const poly of polys){if(pointInPolygon([lon,lat],poly)){found=z;break;}}
          if(found) break;
        }
      }
      if(found){setZona(found);setGeoMethod("exact");}
      else setGeoMethod("manual");
    }catch(e){setGeoErr(e.message||"Indirizzo non trovato. Riprova.");}
    finally{setLoading(false);}
  };

  const confermZona=()=>{setStep(2);setMostraAll(false);};

  const vaiStep3=()=>{
    setS2err("");
    if(!parseFloat(mq)||parseFloat(mq)<=0){setS2err("Inserisci la superficie in mq.");return;}
    if(omiSug){fa("vi",omiSug.vi);fa("cm",omiSug.cm);}
    setStep(3);
  };

  const vaiStep4=()=>{
    setS3err("");
    const r=parseFloat(form.r)||0,vi=parseFloat(form.vi)||0,cm=parseFloat(form.cm);
    if(r<=0&&vi<=0){setS3err("Inserisci almeno la rendita catastale oppure il valore di mercato.");return;}
    if(!cm||cm<=0){setS3err("Inserisci il canone mensile desiderato.");return;}
    setStep(4);
  };

  const calcRes=()=>{
    const r=parseFloat(form.r)||0,vi=parseFloat(form.vi)||0,m=parseFloat(mq),cm=parseFloat(form.cm);
    const zd=ZT[zona]||{min:0,max:0};
    const fc=canoneConFascia(zd,m,sottofascia,maggArredo,maggDurata);
    setRis(calcola({rendita:r,valoreImmobile:vi,mq:m,zona,canoneAnnuo:cm*12,canoneConc:fc.canoneMax,
      condoMese:form.co?parseFloat(form.co):0,manuAnno:form.mn?parseFloat(form.mn):0}));
    setStep(6);
  };

  const reset=()=>{
    setStep(0);setAddr("");setGeoResult(null);setZona(null);setGeoMethod(null);
    setMq("");setStato("normale");setS2err("");
    setForm({r:"",vi:"",cm:"",co:"",mn:""});setS3err("");
    setAttivi([2,4]);setMaggArredo("no");setMaggDurata("3");
    setRis(null);setFiscalTab("ced");setIrpefScag(0);
  };

  const periodi=[1,3,5];
  const getV=(sc,n)=>{
    if(!ris) return 0;
    if(sc==="sfitta") return ris.sfitta[n];
    if(fiscalTab==="ced") return ris[sc][n].netto;
    const map={conc:"concIrpef",lib:"libIrpef",ers:"ersIrpef"};
    return ris[map[sc]][irpefScag][`n${n}`];
  };
  const maxAbs=useMemo(()=>ris?Math.max(1,...["sfitta","conc","lib","ers"].flatMap(s=>periodi.map(p=>Math.abs(getV(s,p))))):1,[ris,fiscalTab,irpefScag]);
  const isBest=(sc,n)=>{if(!ris||sc==="sfitta") return false;return getV(sc,n)===Math.max(...["conc","lib","ers"].map(s=>getV(s,n)));};
  const bw=v=>Math.max(3,Math.abs(v)/maxAbs*100);

  const zd=zona?ZT[zona]:null;
  const addrShort=geoResult?[(geoResult.address?.road||""),(geoResult.address?.suburb||geoResult.address?.quarter||geoResult.address?.village||"")].filter(Boolean).join(", "):"";
  const scenari=[
    {id:"sfitta",tag:"t-s",n:"A",titolo:"Casa sfitta",sub:"IMU ordinaria +10% · TARI a carico proprietario"},
    {id:"ers",tag:"t-e",n:"B",titolo:"Canone moderato ERS",sub:ris?`Canone ERS: ${fEur(ris.canoneERS/12)}/mese · Ced. 10% · IMU -25%`:"ARTE Liguria - stima -25% su concordato max"},
    {id:"conc",tag:"t-c",n:"C",titolo:"Canone concordato 3+2",sub:ris?`${sottofascia}a sottofascia · ${fEur(ris.conc[1].c/12)}/mese · Ced. 10% · IMU -25%`:"Cedolare secca 10% · IMU -25%"},
    {id:"lib",tag:"t-l",n:"D",titolo:"Libero mercato 4+4",sub:"Cedolare secca 21% · IMU ordinaria · Canone da te proposto"},
  ];

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>

      {step>0&&<Sidebar step={step}/>}

      <div className={step===0?"main main-centered":"main"}>

        {/* ── STEP 0 ── */}
        {step===0&&(
          <div style={{width:"100%",maxWidth:680}}>
            <div className="page-header" style={{marginBottom:"1.5rem"}}>
              <h1>SIMULATORE LOCAZIONE A GENOVA</h1>
            </div>
            <div className="content-box" style={{marginBottom:"1.5rem"}}>
              <p className="bold">Scopri quanto vale affittare il tuo immobile a Genova</p>
              <p>Questo simulatore confronta 4 scenari — casa sfitta, canone concordato, libero mercato e ERS — calcolando il netto su 1, 3 e 5 anni con IMU 2026, TARI reale e regime fiscale a scelta.</p>
            </div>
            <div className="content-box" style={{marginBottom:"2rem"}}>
              <p>Come funziona in 5 passi: indirizzo → zona OMI → superficie e stato → dati economici → caratteristiche → risultati in pochi secondi.</p>
              <p style={{marginTop:".75rem",fontSize:".8rem",color:"rgba(255,255,255,.6)"}}>Strumento orientativo. Per la certificazione ufficiale del canone concordato è obbligatoria l'assistenza di un'associazione firmataria dell'accordo territoriale.</p>
            </div>
            <button className="btn-start" onClick={()=>setStep(1)}>INIZIA LA SIMULAZIONE</button>
          </div>
        )}

        {/* ── STEP 1: INDIRIZZO ── */}
        {step===1&&(
          <div>
            <div className="page-header">
              <h2>INSERISCI L'INDIRIZZO DEL TUO APPARTAMENTO E CERCA</h2>
            </div>
            <div style={{marginBottom:"1.25rem"}}>
              <input className="ainput" type="text"
                placeholder="es. Via Balbi 4, Corso Buenos Aires 10..."
                value={addr} onChange={e=>setAddr(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!loading&&cerca()}/>
            </div>
            <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
              <button className="btn-cerca" onClick={cerca} disabled={loading||!addr.trim()}>
                {loading?"⏳ Ricerca in corso...":"CERCA"}
              </button>
            </div>
            {geoErr&&<div className="err">⚠️ {geoErr}</div>}
            {geoResult&&(<>
              {zona&&!mostraAll&&(
                <div className="geo-result">
                  <div style={{fontSize:".8rem",color:"rgba(255,255,255,.6)",marginBottom:".5rem"}}>
                    📍 {geoResult.display_name?.split(",").slice(0,3).join(", ")}
                    {geoMethod==="exact"&&<span className="geo-method geo-exact" style={{marginLeft:8}}>✓ Zona rilevata</span>}
                  </div>
                  <h3>ZONA OMI INDIVIDUATA:</h3>
                  <div className="zona-code">{typeof OMI_DESC!=="undefined"&&OMI_DESC[zona]?`${OMI_DESC[zona]} — `:""}{zona}</div>
                  {ZONA_MADRE[zona]&&<div style={{fontSize:".78rem",color:"rgba(255,255,255,.6)",marginTop:".4rem"}}>⚠️ Sottozona — zona madre: {ZONA_MADRE[zona]}</div>}
                  <div style={{fontSize:".82rem",color:"rgba(255,255,255,.65)",marginTop:".5rem"}}>Fascia: {fEur(zd?.min||0)} – {fEur(zd?.max||0)} /mq/anno</div>
                  <div className="nav-row" style={{justifyContent:"center",marginTop:"1.25rem"}}>
                    <button className="btn-nav" onClick={()=>setMostraAll(true)}>modifica</button>
                    <button className="btn-nav" onClick={confermZona}>conferma</button>
                  </div>
                </div>
              )}
              {(!zona||mostraAll)&&(
                <div>
                  {!zona&&<div className="err" style={{marginBottom:"1rem"}}>⚠️ Indirizzo fuori dai poligoni OMI. Seleziona la zona manualmente.</div>}
                  {mostraAll&&<div style={{fontSize:".85rem",fontWeight:700,marginBottom:".5rem"}}>Seleziona la zona dall'Allegato 2:</div>}
                  <div className="mgrid">
                    {Object.keys(ZT).map(z=>(
                      <button key={z} className={`zbtn ${zona===z?"sel":""}`} onClick={()=>setZona(z)}>
                        {z}<span className="zr">{fEur(ZT[z].min)}–{fEur(ZT[z].max)}</span>
                      </button>
                    ))}
                  </div>
                  {zona&&<div className="nav-row">
                    <button className="btn-nav" onClick={()=>setMostraAll(false)}>← Annulla</button>
                    <button className="btn-nav" onClick={confermZona}>Conferma {zona} →</button>
                  </div>}
                </div>
              )}
            </>)}
            {!geoResult&&<div className="nav-row"><button className="btn-nav" onClick={()=>setStep(0)}>← Indietro</button><div/></div>}
          </div>
        )}

        {/* ── STEP 2: SUPERFICIE ── */}
        {step===2&&(
          <div>
            <div className="page-header">
              <h2>Superficie e stato dell'immobile</h2>
              <p>Indica la superficie utile e le condizioni generali dell'immobile. Questi dati permettono di stimare valore di mercato e canone tramite le quotazioni OMI ufficiali.</p>
            </div>
            <div style={{marginBottom:"1.5rem"}}>
              <label className="field-label">Superficie abitabile (mq)</label>
              <div className="field-sep"/>
              <input className="ainput" type="number" min="0" placeholder="es. 75"
                value={mq} onChange={e=>{setMq(e.target.value);setForm(f=>({...f,vi:"",cm:""}));}}/>
              {omiSug&&parseFloat(mq)>0&&(
                <div className="info-box">📊 OMI {STATO_LABELS[stato].label}: valore ~{fEur(omiSug.vi)} · canone ~{fEur(omiSug.cm)}/mese</div>
              )}
            </div>
            <label className="field-label">Stato conservativo</label>
            <div className="field-sep"/>
            <div className="opt-grid">
              {Object.entries(STATO_LABELS).map(([k,{label,icon,desc}])=>(
                <button key={k} className={`opt-card ${stato===k?"sel":""}`}
                  onClick={()=>{setStato(k);setForm(f=>({...f,vi:"",cm:""}));}}>
                  <div className="opt-icon">{icon}</div>
                  <div className="opt-title">{label}</div>
                  <div className="opt-sub">{desc}</div>
                </button>
              ))}
            </div>
            {s2err&&<div className="err">⚠️ {s2err}</div>}
            <div className="nav-row">
              <button className="btn-nav" onClick={()=>setStep(1)}>← Indietro</button>
              <button className="btn-nav" onClick={vaiStep3}>Avanti →</button>
            </div>
          </div>
        )}

        {/* ── STEP 3: DATI ECONOMICI ── */}
        {(step===3||step===6)&&(
          <div>
            {step===3&&(<>
              <div className="page-header">
                <h2>Dati Economici</h2>
                <p>Inserisci i valori · La rendita catastale non è obbligatoria · Valore e Affitto sono liberamente modificabili</p>
              </div>
              <div className="zbar">
                <span>📍 {addrShort} · Zona <strong>{zona}</strong>{typeof OMI_DESC!=="undefined"&&OMI_DESC[zona]?` – ${OMI_DESC[zona]}`:""} · {mq} mq · {STATO_LABELS[stato].icon} {STATO_LABELS[stato].label}</span>
                <button className="rlink" onClick={()=>setStep(2)}>Modifica</button>
              </div>
              {omiSug&&<div className="info-box" style={{marginBottom:"1.25rem"}}>📊 Valori stimati dalle tabelle OMI ufficiali (AdE 2025). Modificali se conosci i dati reali.</div>}
            </>)}
            <div className="fgrid">
              <div className="field">
                <label>Valore di Mercato (€)</label>
                <input type="number" min="0" value={form.vi} onChange={e=>fa("vi",e.target.value)}/>
                <span className="hint">Stimato dalle tabelle OMI — modificalo se conosci il valore reale.</span>
              </div>
              <div className="field">
                <label>Affitto desiderato (€/mese) *</label>
                <input type="number" min="0" value={form.cm} onChange={e=>fa("cm",e.target.value)}/>
                <span className="hint">Usato per lo scenario libero mercato.</span>
              </div>
              <div className="field">
                <label>Rendita catastale (OPZIONALE)</label>
                <input type="number" min="0" value={form.r} onChange={e=>fa("r",e.target.value)}/>
                <span className="hint">Serve per il calcolo preciso dell'IMU.</span>
              </div>
              <div className="field">
                <label>Spese di amministrazione (€/mese)</label>
                <input type="number" min="0" value={form.co} onChange={e=>fa("co",e.target.value)}/>
                <span className="hint">Lascia vuoto per la stima automatica (€50/mese)</span>
              </div>
              <div className="field">
                <label>Manutenzione ordinaria (€/anno)</label>
                <input type="number" min="0" value={form.mn} onChange={e=>fa("mn",e.target.value)}/>
                <span className="hint">Lascia vuoto per la stima automatica</span>
              </div>
            </div>
            {s3err&&<div className="err">⚠️ {s3err}</div>}
            {step===3&&<div className="nav-row"><button className="btn-nav" onClick={()=>setStep(2)}>← Indietro</button><button className="btn-nav" onClick={vaiStep4}>Avanti →</button></div>}
            {step===6&&<div style={{marginTop:"1.25rem"}}><button className="btn-calcola" onClick={calcRes}>↻ Ricalcola risultati</button></div>}
          </div>
        )}

        {/* ── STEP 4: CARATTERISTICHE ── */}
        {(step===4||step===6)&&(
          <div>
            {step===4&&(
              <div className="page-header">
                <h2>Caratteristiche dell'immobile</h2>
                <p>Seleziona gli elementi presenti secondo l'Allegato 4 dell'accordo territoriale. Determinano la sottofascia del canone concordato.</p>
              </div>
            )}
            {step>4&&<div className="zbar"><span>{attivi.length} elementi attivi · {sottofascia}a sottofascia</span>{step<6&&<button className="rlink" onClick={()=>setStep(4)}>Modifica</button>}</div>}
            {step===4&&(<>
              <label className="field-label">Seleziona le caratteristiche dell'immobile</label>
              <div className="field-sep"/>
              <div className="pill-grid">
                {ELEMENTI.map(el=>{
                  const isOn=attivi.includes(el.id);
                  return(<button key={el.id} className={`pill ${isOn?"on":""}`} title={el.desc} onClick={()=>togglePill(el.id)}>
                    <span>{el.icon}</span>{el.label}{el.obbl&&<span style={{fontSize:".6rem",opacity:.6}}>●</span>}
                  </button>);
                })}
              </div>
              <div className="sf-box">
                <div className="sf-num">{sottofascia}ª</div>
                <div className="sf-label">
                  <strong>{sottofascia===1&&"Sottofascia bassa (1–2 elementi)"}{sottofascia===2&&"Sottofascia media (3–8 elementi)"}{sottofascia===3&&"Sottofascia alta (9+ elementi)"}</strong>
                  {attivi.length} elementi su 21{fasciaCalc&&<span> · Range: <strong style={{color:"var(--yellow)"}}>{fEur(fasciaCalc.canoneMin/12)}/mese – {fEur(fasciaCalc.canoneMax/12)}/mese</strong></span>}
                </div>
              </div>
              <div className="nav-row">
                <button className="btn-nav" onClick={()=>setStep(3)}>← Indietro</button>
                <button className="btn-nav" onClick={()=>setStep(5)}>Avanti →</button>
              </div>
            </>)}
          </div>
        )}

        {/* ── STEP 5: MAGGIORAZIONI ── */}
        {(step===5||step===6)&&(
          <div>
            {step===5&&(
              <div className="page-header">
                <h2>Maggiorazioni cumulative</h2>
                <p>Indica se l'immobile è arredato e la durata del contratto concordato. Queste maggiorazioni si applicano al canone concordato secondo il Titolo A dell'accordo.</p>
              </div>
            )}
            {step>5&&<div className="zbar"><span>Arredo: {maggArredo==="no"?"Nessuno":maggArredo==="parziale"?"Parziale":"Completo"} · Durata: {maggDurata}+2 anni{fasciaCalc?` · Canone max: ${fEur(fasciaCalc.canoneMax/12)}/mese`:""}</span>{step<6&&<button className="rlink" onClick={()=>setStep(5)}>Modifica</button>}</div>}
            {step===5&&(<>
              <label className="field-label">Arredamento</label>
              <div className="field-sep"/>
              <div className="opt-grid" style={{marginBottom:"1.5rem"}}>
                {[{v:"no",label:"Non arredato",icon:"🚫",perc:"+0%"},{v:"parziale",label:"Parz. arredato",icon:"🛋️",perc:"+6%"},{v:"completo",label:"Completamente arredato",icon:"🏠",perc:"+12%"}].map(o=>(
                  <button key={o.v} className={`opt-card ${maggArredo===o.v?"sel":""}`} onClick={()=>setMaggArredo(o.v)}>
                    <div className="opt-icon">{o.icon}</div><div className="opt-title">{o.label}</div><div className="opt-perc">{o.perc}</div>
                  </button>
                ))}
              </div>
              <label className="field-label">Durata contratto</label>
              <div className="field-sep"/>
              <div className="opt-grid">
                {[{v:"3",label:"3+2 anni",perc:"+0%"},{v:"4",label:"4+2 anni",perc:"+2%"},{v:"5",label:"5+2 anni",perc:"+4%"},{v:"6",label:"6+2 anni",perc:"+6%"}].map(o=>(
                  <button key={o.v} className={`opt-card ${maggDurata===o.v?"sel":""}`} onClick={()=>setMaggDurata(o.v)}>
                    <div className="opt-icon">📅</div><div className="opt-title">{o.label}</div><div className="opt-perc">{o.perc}</div>
                  </button>
                ))}
              </div>
              {fasciaCalc&&(maggArredo!=="no"||maggDurata!=="3")&&(
                <div className="info-box" style={{marginTop:"1rem"}}>
                  <strong>Maggiorazione totale: +{Math.round(fasciaCalc.totPerc*100)}%</strong> → Canone max: <strong>{fEur(fasciaCalc.canoneMax/12)}/mese</strong>
                </div>
              )}
              <div className="nav-row">
                <button className="btn-nav" onClick={()=>setStep(4)}>← Indietro</button>
                <button className="btn-calcola" onClick={calcRes}>Calcola risultati →</button>
              </div>
            </>)}
          </div>
        )}

        {/* ── STEP 6: RISULTATI ── */}
        {step===6&&ris&&(<>
          <div ref={risRef}></div>
          <div className="results-header">
            <h1>RISULTATO</h1>
            <div className="sub">{addrShort&&<span>📍 {addrShort} · </span>}Zona <strong>{zona}</strong> · {mq} mq · {STATO_LABELS[stato]?.label}</div>
          </div>

          {ris.renditaStimata&&<div className="warn" style={{marginBottom:"1.5rem"}}>⚠️ Rendita catastale non inserita: IMU stimata dal valore di mercato ({fEur(ris.renditaEff)}/anno). Per un calcolo preciso inserisci la rendita dalla visura catastale.</div>}

          {/* REGIME FISCALE */}
          <div style={{marginBottom:"1.5rem"}}>
            <div className="stitle">Regime fiscale</div>
            <div className="fiscal-tabs">
              <button className={`fiscal-tab ${fiscalTab==="ced"?"on":""}`} onClick={()=>setFiscalTab("ced")}>Cedolare secca</button>
              <button className={`fiscal-tab ${fiscalTab==="irpef"?"on":""}`} onClick={()=>setFiscalTab("irpef")}>IRPEF ordinaria</button>
            </div>
            <div className="fiscal-section">
              {fiscalTab==="ced"&&<div style={{fontSize:".85rem",lineHeight:1.6}}><strong>Cedolare secca:</strong> aliquota fissa · nessun aggiornamento ISTAT.<br/>Concordato/ERS: 10% · Libero mercato: 21%</div>}
              {fiscalTab==="irpef"&&(<>
                <div style={{fontSize:".85rem",marginBottom:".75rem",lineHeight:1.6}}><strong>IRPEF ordinaria</strong> — base imponibile = canone × 95%.<br/><strong style={{color:"var(--red)"}}>Con IRPEF non si applica il -25% IMU del canone concordato.</strong></div>
                <div style={{fontSize:".78rem",fontWeight:700,marginBottom:".4rem",color:"var(--muted)"}}>Scaglione marginale IRPEF:</div>
                <div className="irpef-grid">
                  {IRPEF_SCAGLIONI.map((s,i)=>(
                    <button key={i} style={{cursor:"pointer",border:irpefScag===i?"2px solid var(--navy)":"2px solid var(--border)",background:irpefScag===i?"var(--navy)":"white",borderRadius:10,padding:".75rem 1rem",textAlign:"left",transition:"all .2s"}} onClick={()=>setIrpefScag(i)}>
                      <div style={{fontWeight:700,fontSize:".78rem",color:irpefScag===i?"#fff":"var(--navy)"}}>{s.label}</div>
                      <div style={{fontSize:".68rem",color:irpefScag===i?"rgba(255,255,255,.7)":"var(--muted)",marginTop:2}}>{s.desc}</div>
                    </button>
                  ))}
                </div>
              </>)}
            </div>
          </div>

          {/* SCENARI */}
          <div className="stitle">📊 Risultati per scenario</div>

          {/* SFITTA */}
          <div className="scenario-block">
            {(()=>{const id="sfitta",sc=scenari.find(s=>s.id===id);return(
              <div className={`scard ${isBest(id,5)?"scard-best":""}`}>
                <div className="ch2"><span className="ctag t-s">Scenario A</span>{isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                  <h3>{sc.titolo}</h3><div className="sub">{sc.sub}</div></div>
                <div className="cb">{periodi.map(p=>{const v=getV(id,p);return(<div className="trow" key={p}><span className="tl">{p} {p===1?"anno":"anni"}</span><span className={`tv ${v<0?"neg":"pos"}`}>{fEur(v,true)}</span></div>);})}</div>
                <div className="cf">IMU: {fEur(ris.imuOrd*1.1)}/anno · TARI: {fEur(ris.tariSfitta)}/anno</div>
              </div>
            )})()}
            <div className="scheda scheda-sfitta">
              <span className="scheda-icon">⚠️</span>
              <div className="scheda-title">Un rischio crescente</div>
              <div className="scheda-msg">"La casa sfitta non è neutra: è una passività."</div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>IMU maggiorata +10% ogni anno, interamente a tuo carico</span></div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>TARI a carico del proprietario: zero entrate, costi certi</span></div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Deterioramento accelerato senza manutenzione continuativa</span></div>
              <div className="scheda-divider"></div>
              <div className="scheda-stat"><span className="scheda-stat-num">{fEur(getV("sfitta",5),true)}</span>perdita netta stimata a 5 anni</div>
            </div>
          </div>

          {/* ERS */}
          <div className="scenario-block">
            {(()=>{const id="ers",sc=scenari.find(s=>s.id===id);return(
              <div className={`scard ${isBest(id,5)?"scard-best":""}`}>
                <div className="ch2"><span className="ctag t-e">Scenario B</span>{isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                  <h3>{sc.titolo}</h3><div className="sub">{sc.sub}</div></div>
                <div className="cb">
                  <div style={{fontSize:".72rem",background:"#fff3e0",border:"1px solid #f0c88a",borderRadius:6,padding:".4rem .6rem",marginBottom:".5rem",lineHeight:1.5}}>⚠️ <strong>Stima orientativa</strong> — canone ERS = concordato max -25%</div>
                  {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);return(<div className="trow" key={p}><span className="tl">{p} {p===1?"anno":"anni"}</span><span className={`tv ${b?"best":v<0?"neg":"pos"}`}>{fEur(v,true)}{b?" ★":""}</span></div>);})}
                </div>
                <div className="cf">Canone ERS: {fEur(ris.canoneERS/12)}/mese (-25% su max concordato)</div>
              </div>
            )})()}
            <div className="scheda scheda-ers">
              <span className="scheda-icon">🤝</span>
              <div className="scheda-title">Stabile, protetto, conveniente</div>
              <div className="scheda-msg">"Meno rischio, più stabilità. Una scelta che tutela anche te."</div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Cedolare secca al 10% e IMU ridotta del 25%</span></div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Accesso al Fondo di Garanzia FILSE contro la morosità</span></div>
              <div className="scheda-item"><span className="scheda-bullet">▪</span><span>Accompagnamento nella gestione dell'inquilino</span></div>
              <div className="scheda-divider"></div>
              <div className="scheda-stat"><span className="scheda-stat-num">{fEur(getV("ers",5),true)}</span>rendimento netto stimato a 5 anni</div>
              <div className="scheda-stat" style={{marginTop:".4rem"}}><span className="scheda-stat-num">{fEur(getV("ers",5)-getV("sfitta",5),true)}</span>vantaggio rispetto alla casa sfitta</div>
            </div>
          </div>

          {/* ALTRI RISULTATI */}
          <div style={{marginBottom:"2.5rem"}}>
            <button onClick={()=>setMostraAltri(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,background:"var(--navy)",border:"none",borderRadius:12,padding:"1rem 1.5rem",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:"1rem",fontWeight:700,color:"white",width:"100%",justifyContent:"space-between",marginBottom:"1rem"}}>
              <span>📋 Altri risultati: Canone concordato 3+2 e Libero mercato 4+4</span>
              <span>{mostraAltri?"▲ Nascondi":"▼ Mostra"}</span>
            </button>
            {mostraAltri&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.25rem"}}>
                {["conc","lib"].map(id=>{const sc=scenari.find(s=>s.id===id);return(
                  <div className={`scard ${isBest(id,5)?"scard-best":""}`} key={id}>
                    <div className="ch2"><span className={`ctag ${sc.tag}`}>{sc.n}</span>{isBest(id,5)&&<span className="best-badge">✓ Migliore su 5 anni</span>}
                      <h3>{sc.titolo}</h3><div className="sub">{sc.sub}</div></div>
                    <div className="cb">
                      {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);
                        let dl=null;
                        if(fiscalTab==="irpef"){const vCed=ris[id][p].netto,diff=v-vCed;if(Math.abs(diff)>50)dl=<span className={`delta-badge ${diff>0?"delta-pos":"delta-neg"}`}>{fEur(diff,true)} vs ced.</span>;}
                        return(<div className="trow" key={p}><span className="tl">{p} {p===1?"anno":"anni"}</span><span><span className={`tv ${b?"best":v<0?"neg":"pos"}`}>{fEur(v,true)}{b?" ★":""}</span>{dl&&<span style={{marginLeft:6}}>{dl}</span>}</span></div>);
                      })}
                    </div>
                    <div className="cf">
                      {id==="conc"&&fiscalTab==="ced"&&`Canone: ${fEur(ris.cConc/12)}/mese · Ced.10% · IMU: ${fEur(ris.imuConc)}/anno`}
                      {id==="conc"&&fiscalTab==="irpef"&&`Canone: ${fEur(ris.cConc/12)}/mese · IRPEF ${Math.round(IRPEF_SCAGLIONI[irpefScag].aliq*100)}% · IMU: ${fEur(ris.imuOrd)}/anno`}
                      {id==="lib"&&fiscalTab==="ced"&&`Canone: ${fEur(ris.canoneAnnuo/12)}/mese · Ced.21% · IMU: ${fEur(ris.imuOrd)}/anno`}
                      {id==="lib"&&fiscalTab==="irpef"&&`Canone: ${fEur(ris.canoneAnnuo/12)}/mese · IRPEF ${Math.round(IRPEF_SCAGLIONI[irpefScag].aliq*100)}% su 95%`}
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>

          {/* ANALISI */}
          <div style={{marginBottom:"2rem"}}>
            <button onClick={()=>setMostraAnalisi(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,background:"var(--navy)",border:"none",borderRadius:12,padding:"1rem 1.5rem",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:"1rem",fontWeight:700,color:"white",width:"100%",justifyContent:"space-between",marginBottom:"1rem"}}>
              <span>📊 Analisi comparativa — tabella e grafico</span>
              <span>{mostraAnalisi?"▲ Nascondi":"▼ Mostra"}</span>
            </button>
            {mostraAnalisi&&(
              <div>
                <div className="stitle">Tabella comparativa</div>
                <div className="twrap" style={{marginBottom:"1.5rem"}}>
                  <table>
                    <thead><tr><th>Scenario</th><th>1 anno</th><th>3 anni</th><th>5 anni</th></tr></thead>
                    <tbody>
                      {[{id:"sfitta",l:"🏚️ Casa sfitta"},{id:"ers",l:"🏛️ Canone moderato ERS"},{id:"conc",l:"🤝 Canone concordato 3+2"},{id:"lib",l:"🏘️ Libero mercato 4+4"}].map(({id,l})=>(
                        <tr key={id}><td>{l}{id==="ers"&&<span className="sub-row">⚠️ stima orientativa</span>}{id==="conc"&&fiscalTab==="irpef"&&<span className="sub-row">IMU senza riduzione 25%</span>}</td>
                          {periodi.map(p=>{const v=getV(id,p),b=isBest(id,p);return(<td key={p} className={b?"best":v<0?"worst":""}>{fEur(v,true)}{b?" ★":""}</td>);})}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="stitle">Grafico comparativo</div>
                <div className="pbtn">{periodi.map(p=><button key={p} className={periodo===p?"a":""} onClick={()=>setPeriodo(p)}>{p} {p===1?"anno":"anni"}</button>)}</div>
                {[{id:"conc",l:"🤝 Canone concordato",c:"bf-c"},{id:"lib",l:"🏘️ Libero mercato",c:"bf-l"},{id:"ers",l:"🏛️ ERS/moderato ⚠️",c:"bf-e"}].map(({id,l,c})=>{
                  const v=getV(id,periodo);
                  return(<div className="bg" key={id}><div className="bg-label">{l}</div><div className="bt"><div className={`bf ${c}`} style={{width:bw(v)+"%"}}>{fEur(v,true)}</div></div></div>);
                })}
                <div style={{borderTop:"2px dashed rgba(30,45,90,.15)",marginTop:".75rem",paddingTop:"1rem"}}>
                  <div className="bg-label" style={{color:"var(--red)"}}>🏚️ Casa sfitta (costo)</div>
                  <div className="bt" style={{marginTop:".35rem"}}><div className="bf bf-s" style={{width:bw(getV("sfitta",periodo))+"%"}}>{fEur(getV("sfitta",periodo),true)}</div></div>
                </div>
              </div>
            )}
          </div>

          {/* NOTE */}
          <div className="note">
            <strong>Note metodologiche:</strong>
            <ul>
              <li><strong>Zona {zona}:</strong> fascia {fEur(zd?.min||0)}/mq/anno – {fEur(zd?.max||0)}/mq/anno · Allegato 2, Accordo Territoriale Genova 29/05/2025</li>
              <li><strong>IMU 2026 Genova:</strong> ordinaria 1,06% · canone concordato con inquilino residente -25%</li>
              <li><strong>Cedolare secca:</strong> 21% libero mercato · 10% canone concordato/ERS</li>
              <li><strong>IRPEF ordinaria:</strong> base imponibile = canone × 95%</li>
              <li><strong>TARI:</strong> calcolata su {mq} mq, tariffa 1 componente (DCC 60/2024)</li>
              <li><strong>Non inclusi:</strong> costi registrazione, spese legali, aggiornamento ISTAT con IRPEF</li>
            </ul>
          </div>

          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:"2rem"}}>
            <button className="btn-nav" onClick={reset}>🔄 Nuova simulazione</button>
            <button className="btn-nav" onClick={()=>window.print()}>🖨️ Stampa / Salva PDF</button>
          </div>
        </>)}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
